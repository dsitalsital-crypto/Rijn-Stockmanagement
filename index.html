*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg1:#ffffff;--bg2:#f5f5f3;--bg3:#eeede9;
  --t1:#1a1a1a;--t2:#6b6b6b;--t3:#9b9b9b;
  --b2:rgba(0,0,0,0.2);--b3:rgba(0,0,0,0.1);
  --r1:8px;--r2:12px;
  --sans:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  --mono:'Courier New',monospace;
}
@media(prefers-color-scheme:dark){:root{
  --bg1:#1e1e1e;--bg2:#2a2a2a;--bg3:#333;
  --t1:#e8e8e8;--t2:#a0a0a0;--t3:#6a6a6a;

body{background:var(--bg3);font-family:var(--sans);color:var(--t1);min-height:100vh;padding:1.5rem}
.wrap{max-width:1100px;margin:0 auto}
input,select,textarea,button{font-family:var(--sans)}
input[type=text],input[type=password],input[type=number],select{height:34px;font-size:13px;border-radius:var(--r1);border:0.5px solid var(--b2);background:var(--bg2);color:var(--t1);padding:0 10px;width:100%}

.btn{display:inline-flex;align-items:center;gap:5px;padding:6px 13px;font-size:12px;border:0.5px solid var(--b2);border-radius:var(--r1);background:transparent;color:var(--t1);cursor:pointer;transition:all .15s;white-space:nowrap}
.btn:hover{background:var(--bg2)}
.bp{background:#D4537E;color:#fff;border-color:#D4537E}.bp:hover{background:#993556;border-color:#993556}
.bsm{padding:3px 9px;font-size:11px}

.ph{padding:10px 14px;border-bottom:0.5px solid var(--b3);display:flex;align-items:center;justify-content:space-between;gap:8px;flex-wrap:wrap}
.pht{font-size:13px;font-weight:500}
.tw{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:12px;table-layout:fixed}
thead th{padding:7px 12px;text-align:left;color:var(--t2);font-weight:400;border-bottom:0.5px solid var(--b3);white-space:nowrap}
tbody td{padding:7px 12px;border-bottom:0.5px solid var(--b3);vertical-align:middle;overflow:hidden;text-overflow:ellipsis}
tbody tr:last-child td{border-bottom:none}
tbody tr:hover{background:var(--bg2)}
.tabs{display:flex;gap:3px;background:var(--bg2);border-radius:var(--r1);padding:3px;border:0.5px solid var(--b3);flex-wrap:wrap;margin-bottom:1rem}
.tab{padding:5px 11px;font-size:12px;border:none;background:transparent;color:var(--t2);border-radius:6px;cursor:pointer;transition:all .15s}
.tab.on{background:var(--bg1);color:var(--t1);font-weight:500;border:0.5px solid var(--b3)}
.barcell{display:flex;align-items:center;gap:5px}
.barbg{flex:1;height:5px;background:var(--bg2);border-radius:3px;min-width:35px}
.barfill{height:5px;border-radius:3px}
.mover{position:fixed;inset:0;background:rgba(0,0,0,.45);display:flex;align-items:center;justify-content:center;z-index:999}
.mbox{background:var(--bg1);border-radius:var(--r2);border:0.5px solid var(--b3);padding:1.4rem;width:370px;max-width:95vw}
.mbox h3{font-size:15px;font-weight:500;margin-bottom:1rem}
.fr{margin-bottom:10px}
.fr label{display:block;font-size:11px;color:var(--t2);margin-bottom:3px}
.fa{display:flex;gap:7px;justify-content:flex-end;margin-top:1rem}
.ai{display:flex;align-items:center;justify-content:space-between;padding:9px 11px;border-radius:var(--r1);margin-bottom:7px;font-size:12px}
.alow{background:#FAEEDA;border:0.5px solid #FAC775}
.aout{background:#FCEBEB;border:0.5px solid #F7C1C1}
.lcwrap{display:flex;align-items:center;justify-content:center;min-height:80vh}
.lcbox{background:var(--bg1);border:0.5px solid var(--b3);border-radius:var(--r2);padding:2rem;width:340px;max-width:95vw}
.lbtn{padding:3px 10px;font-size:11px;border-radius:20px;border:0.5px solid var(--b2);background:transparent;color:var(--t2);cursor:pointer;transition:all .15s}
.lbtn.on{background:#D4537E;color:#fff;border-color:#D4537E}
.loading{display:flex;align-items:center;justify-content:center;padding:3rem;color:var(--t2);font-size:13px;gap:10px}
.spinner{width:18px;height:18px;border:2px solid var(--b3);border-top-color:#D4537E;border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.toast{position:fixed;bottom:1.5rem;right:1.5rem;background:var(--bg1);border:0.5px solid var(--b3);border-radius:var(--r1);padding:10px 16px;font-size:12px;z-index:9999;box-shadow:0 2px 12px rgba(0,0,0,.12)}
.toast.ok{border-color:#639922;color:#3B6D11}
.toast.err{border-color:#E24B4A;color:#A32D2D}

};

async function api(path,opts={}){
  const isDelete=opts.method==='DELETE';
  const sep=path.includes('?')?'&':'?';
  const url=SUPABASE_URL+'/rest/v1/'+path+sep+'apikey='+SUPABASE_KEY;
  const headers={'apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY,'Content-Type':'application/json'};
  if(!isDelete) headers['Prefer']='return=representation';
  const res=await fetch(url,{...opts,headers});
  if(!res.ok){const e=await res.text();throw new Error(e)}
  const txt=await res.text();
  return txt?JSON.parse(txt):null;
}

async function loadAll(){
  S.loading=true;render();
  try{
    const[stores,products,stockRows,orders,orderItems,accounts,messages]=await Promise.all([
      api('stores?order=id'),
      api('products?order=id'),
      api('stock?select=*'),
      api('orders?order=id.desc'),
      api('order_items?select=*'),
      api('accounts?order=username'),
      api('messages?order=created_at'),
    ]);
    S.stores=stores||[];
    S.products=products||[];
    S.stock={};
    (stockRows||[]).forEach(r=>{S.stock[r.store_id+'-'+r.product_id]=r.quantity});
    S.orders=orders||[];
    S.orderItems=orderItems||[];
    S.accounts=accounts||[];
    S.messages=messages||[];
  }catch(e){showToast('❌ '+e.message,'err')}
  S.loading=false;render();
}

function qty(sid,pid){return S.stock[sid+'-'+pid]??0}
function storeTotal(sid){return S.products.reduce((a,p)=>a+qty(sid,p.id),0)}
function storeItems(sid){return S.products.filter(p=>qty(sid,p.id)>0).length}
function totalAll(){let x=0;S.products.forEach(p=>S.stores.forEach(s=>{x+=qty(s.id,p.id)}));return x}
function allLow(){let c=0;S.products.forEach(p=>S.stores.forEach(s=>{const q=qty(s.id,p.id);if(p.min_stock>0&&q>0&&q<p.min_stock)c++}));return c}
function allOut(){let c=0;S.products.forEach(p=>S.stores.forEach(s=>{if(p.min_stock>0&&qty(s.id,p.id)===0)c++}));return c}
function openReqs(){return S.requests.filter(r=>r.status==='new'||r.status==='sent').length}

function sbadge(q,min){const l=t();if(min===0)return`<span class="badge bok">${l.okLbl}</span>`;return q===0?`<span class="badge bout">${l.outLbl}</span>`:q<min?`<span class="badge blow">${l.lowLbl}</span>`:`<span class="badge bok">${l.okLbl}</span>`}
function rbadge(s){const l=t();return s==='new'?`<span class="badge bnew">${l.new}</span>`:s==='sent'?`<span class="badge bsent">${l.sent}</span>`:`<span class="badge bdone">${l.done}</span>`}

function showToast(msg,type='ok'){
  const el=document.createElement('div');
  el.className='toast '+type;el.textContent=msg;
  document.body.appendChild(el);
  setTimeout(()=>el.remove(),2500);
}

function bStock(){
  const l=t();
  const cols=S.filterStore==='all'?S.stores:S.stores.filter(s=>s.id===parseInt(S.filterStore));
  const maxQ=Math.max(1,...S.products.flatMap(p=>S.stores.map(s=>qty(s.id,p.id))));
  const filtered=S.products.filter(p=>{
    if(S.search&&!p.name.toLowerCase().includes(S.search.toLowerCase())&&!p.sku.toLowerCase().includes(S.search.toLowerCase()))return false;
    if(S.filterStore!=='all'){const sid=parseInt(S.filterStore),q=qty(sid,p.id);if(S.filterStatus==='low'&&!(q>0&&q<p.min_stock))return false;if(S.filterStatus==='out'&&q!==0)return false}
    return true;
  });
  const show=cols.slice(0,5),extra=cols.length-show.length;
  return`<div class="panel">
  <div class="ph"><span class="pht">${l.stockOverview}</span>
    <div style="display:flex;gap:7px;flex-wrap:wrap;align-items:center">
      <input type="text" id="srch" placeholder="${l.search}" value="${S.search}" style="width:130px;height:30px;font-size:12px">
      <select id="fstore" style="height:30px;font-size:12px"><option value="all">${l.allStores}</option>${S.stores.map(s=>`<option value="${s.id}" ${S.filterStore==s.id?'selected':''}>${s.name}</option>`).join('')}</select>
      <select id="fstatus" style="height:30px;font-size:12px"><option value="all">${l.allStatus}</option><option value="low">${l.low}</option><option value="out">${l.out}</option></select>
      <button class="btn bsm" id="refresh-btn" title="Ververs">↻</button>
    </div>
  </div>
  <div class="tw"><table>
    <colgroup><col style="width:160px"><col style="width:70px">${show.map(()=>'<col style="width:115px">').join('')}${extra?'<col style="width:70px">':''}<col style="width:58px"><col style="width:60px"></colgroup>
    <thead><tr><th>${l.product}</th><th>${l.sku}</th>${show.map(s=>`<th title="${s.name}">${s.name}</th>`).join('')}${extra?`<th>+${extra}</th>`:''}<th>${l.total}</th><th>${l.status}</th></tr></thead>
    <tbody>${filtered.length?filtered.map(p=>{
      const tot=S.stores.reduce((a,s)=>a+qty(s.id,p.id),0);
      return`<tr>
        <td><div style="font-weight:500">${p.name}</div><div style="font-size:10px;color:var(--t3)">${p.category} · ${p.size}</div></td>
        <td style="color:var(--t2)">${p.sku}</td>
        ${show.map(s=>{const q=qty(s.id,p.id),pct=Math.round(q/maxQ*100),c=barCol(q,p.min_stock);
          return`<td><div class="barcell"><span style="min-width:26px;text-align:right;font-weight:500;color:${q===0?RED:q<p.min_stock?AMBER:'var(--t1)'}">${q}</span><div class="barbg"><div class="barfill" style="width:${pct}%;background:${c}"></div></div></div>
          <span class="elk" data-edit="${s.id}-${p.id}" style="font-size:10px;color:var(--t3);cursor:pointer">${l.edit}</span>
          <span class="rlk" data-req="${s.id}-${p.id}" style="font-size:10px;color:#7F77DD;cursor:pointer;margin-left:4px">${l.req}</span></td>`;
        }).join('')}
        ${extra?`<td style="color:var(--t3);font-size:11px">${l.useFilter}</td>`:''}
        <td style="font-weight:500">${tot}</td>
        <td>${sbadge(tot,p.min_stock)}</td>
      </tr>`;
    }).join(''):`<tr><td colspan="20" style="text-align:center;padding:2rem;color:var(--t3)">${l.noProducts}</td></tr>`}
    </tbody>
  </table></div>
</div>`}

function bAlerts(){
  const l=t(),items=[];
  S.products.forEach(p=>S.stores.forEach(s=>{const q=qty(s.id,p.id);if(q===0)items.push({type:'out',s,p,q});else if(q<p.min_stock)items.push({type:'low',s,p,q})}));
  items.sort((a,b)=>a.type==='out'&&b.type!=='out'?-1:1);
  return`<div class="panel">
  <div class="ph"><span class="pht">${l.stockAlerts}</span><span style="font-size:11px;color:var(--t2)">${items.length} ${l.active}</span></div>

    <div class="ai ${a.type==='out'?'aout':'alow'}">

      <div style="font-size:11px;color:var(--t2)">${a.type==='out'?l.outOfStockLbl:`${l.onlyLeft} ${a.q} ${l.leftOf} ${a.p.min_stock})`} · ${a.p.sku}</div></div>

function bindModal(){

    const sid=S.modal.storeId,pid=S.modal.productId,newQty=parseInt(gv('m-qty'))||0;
    S.modal=null;render();
    try{
      const existing=await api(`stock?store_id=eq.${sid}&product_id=eq.${pid}`);
      if(existing&&existing.length>0){
        await api(`stock?store_id=eq.${sid}&product_id=eq.${pid}`,{method:'PATCH',body:JSON.stringify({quantity:newQty})});
      }else{
        await api('stock',{method:'POST',body:JSON.stringify({store_id:sid,product_id:pid,quantity:newQty})});
      }
      S.stock[sid+'-'+pid]=newQty;
      showToast('✓ '+t().saved);render();
    }catch(e){showToast('❌ '+t().errSave,'err')}
  });

  const ssto=g('ssto');if(ssto)ssto.addEventListener('click',async()=>{
    const n=gv('m-name'),c=gv('m-city');
    if(!n)return;S.modal=null;render();
    try{
      const[ns]=await api('stores',{method:'POST',body:JSON.stringify({name:n,city:c||n})});
      S.stores.push(ns);
      const uid='store'+ns.id;
      const[na]=await api('accounts',{method:'POST',body:JSON.stringify({id:uid,username:uid,password:uid+'pass',role:'store',store_id:ns.id,display_name:n})});
      S.accounts.push(na);
      showToast('✓ '+t().saved);render();
    }catch(e){showToast('❌ '+t().errSave,'err')}
  });

  const uprod=g('uprod');if(uprod)uprod.addEventListener('click',async()=>{
    const pid=S.modal.product.id;
    const minVal=gv('m-min');const updated={name:gv('m-name'),sku:gv('m-sku'),category:gv('m-cat'),size:gv('m-size'),min_stock:minVal===''?15:parseInt(minVal)};
    S.modal=null;render();
    try{
      await api(`products?id=eq.${pid}`,{method:'PATCH',body:JSON.stringify(updated)});
      const p=S.products.find(x=>x.id===pid);
      if(p)Object.assign(p,updated);
      showToast('✓ '+t().saved);render();
    }catch(e){showToast('❌ '+t().errSave,'err')}
  });
    const sp=g('sp');if(sp)sp.addEventListener('click',async()=>{
    const n=gv('m-name');if(!n)return;S.modal=null;render();
    try{
      const[np]=await api('products',{method:'POST',body:JSON.stringify({name:n,sku:gv('m-sku')||'APP-???',category:gv('m-cat')||t().general,size:gv('m-size')||'—',min_stock:(gv('m-min')===''?15:parseInt(gv('m-min')))})});
      S.products.push(np);showToast('✓ '+t().saved);render();
    }catch(e){showToast('❌ '+t().errSave,'err')}
  });

  const sorder=g('sorder');if(sorder)sorder.addEventListener('click',async()=>{
    const isEdit=S.modal.type==='edit-order';
    const sid=parseInt(g('m-store').value);
    const note=gv('m-note');
    const rows=[...document.querySelectorAll('.req-row')].map((_,i)=>({
      product_id:parseInt(document.querySelectorAll('.rp-product')[i]?.value),
      quantity:parseInt(document.querySelectorAll('.rp-qty')[i]?.value)||1
    })).filter(r=>r.product_id);
    if(!rows.length)return;
    const orderId=isEdit?S.modal.order.id:null;
    S.modal=null;render();
    try{
      if(isEdit){
        await api(`orders?id=eq.${orderId}`,{method:'PATCH',body:JSON.stringify({store_id:sid,note})});
        await api(`order_items?order_id=eq.${orderId}`,{method:'DELETE',headers:{}});
        for(const r of rows){await api('order_items',{method:'POST',body:JSON.stringify({order_id:orderId,...r})})}
        const o=(S.orders||[]).find(x=>x.id===orderId);
        if(o){o.store_id=sid;o.note=note;}
        S.orderItems=(S.orderItems||[]).filter(i=>i.order_id!==orderId);
        rows.forEach((r,i)=>S.orderItems.push({id:Date.now()+i,order_id:orderId,...r}));
      }else{
        const[newOrder]=await api('orders',{method:'POST',body:JSON.stringify({store_id:sid,note,status:'new',created_at:new Date().toISOString().slice(0,10)})});
        for(const r of rows){
          const[item]=await api('order_items',{method:'POST',body:JSON.stringify({order_id:newOrder.id,...r})});
          (S.orderItems=S.orderItems||[]).push(item);
        }
        (S.orders=S.orders||[]).unshift(newOrder);
        if(S.session.role==='admin')S.adminSubTab='requests';
      }
      showToast('✓ '+t().saved);render();
    }catch(e){showToast('❌ '+t().errSave,'err')}
  });
  const arb2=g('add-row-btn');if(arb2)arb2.addEventListener('click',()=>{

    S.modal.rows=[...rows,{productId:S.products[0]?.id,qty:20}];
    render();bindModal();
  });

    const i=parseInt(el.dataset.i);
    S.modal.rows=S.modal.rows.filter((_,idx)=>idx!==i);
    render();bindModal();
  }));
    const sac=g('sac');if(sac)sac.addEventListener('click',async()=>{
    const u=gv('m-user'),p=gv('m-pass'),n=gv('m-name'),role=gv('m-role'),sl=gv('m-sl');
    if(!u||!p)return;S.modal=null;render();

      const[na]=await api('accounts',{method:'POST',body:JSON.stringify({id:'acc_'+Date.now(),username:u,password:p,display_name:n||u,role,store_id:sl?parseInt(sl):null})});
      S.accounts.push(na);showToast('✓ '+t().saved);render();
    }catch(e){showToast('❌ '+e.message,'err')}
  });
}

async function updateOrderStatus(id,status){
  try{
    await api(`orders?id=eq.${id}`,{method:'PATCH',body:JSON.stringify({status})});
    const o=(S.orders||[]).find(x=>x.id===id);
    if(o){
      o.status=status;
      if(status==='done'){
        const items=(S.orderItems||[]).filter(i=>i.order_id===id);
        for(const item of items){
          const sid=o.store_id,pid=item.product_id,addQty=item.quantity;
          const key=sid+'-'+pid;
          const newQty=(S.stock[key]??0)+addQty;
          const existing=await api(`stock?store_id=eq.${sid}&product_id=eq.${pid}`);
          if(existing&&existing.length>0){
            await api(`stock?store_id=eq.${sid}&product_id=eq.${pid}`,{method:'PATCH',body:JSON.stringify({quantity:newQty})});
          }else{
            await api('stock',{method:'POST',body:JSON.stringify({store_id:sid,product_id:pid,quantity:newQty})});
          }
          S.stock[key]=newQty;
        }
        const store=S.stores.find(s=>s.id===o.store_id);
        showToast('✓ Voorraad bijgewerkt voor '+(store?store.name:'winkel'));
      }else{
        showToast('✓ '+t().saved);
      }
    }
    render();
  }catch(e){showToast('❌ '+t().errSave,'err')}
}

async function deleteOrder(id){
  try{
    await api(`orders?id=eq.${id}`,{method:'DELETE',headers:{}});
    S.orders=(S.orders||[]).filter(o=>o.id!==id);
    S.orderItems=(S.orderItems||[]).filter(i=>i.order_id!==id);
    render();
  }catch(e){showToast('❌ '+t().errSave,'err')}
}

async function deleteStore(id){
  try{
    await api(`stores?id=eq.${id}`,{method:'DELETE',headers:{'Prefer':''}});
    S.stores=S.stores.filter(s=>s.id!==id);
    S.accounts=S.accounts.filter(a=>a.store_id!==id);

    Object.keys(S.stock).forEach(k=>{if(k.startsWith(id+'-'))delete S.stock[k]});

}
async function deleteProduct(id){
  try{
