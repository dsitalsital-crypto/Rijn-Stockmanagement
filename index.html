<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg1:#fff;--bg2:#f5f5f3;--bg3:#eeede9;
  --t1:#1a1a1a;--t2:#6b6b6b;--t3:#9b9b9b;
  --b2:rgba(0,0,0,0.2);--b3:rgba(0,0,0,0.1);
  --r1:8px;--r2:12px;--sans:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
}
@media(prefers-color-scheme:dark){:root{
  --bg1:#1e1e1e;--bg2:#2a2a2a;--bg3:#333;
  --t1:#e8e8e8;--t2:#a0a0a0;--t3:#6a6a6a;
  --b2:rgba(255,255,255,0.2);--b3:rgba(255,255,255,0.1);
}}
body{background:var(--bg3);font-family:var(--sans);color:var(--t1);min-height:100vh;padding:1.5rem;transition:background .3s,color .3s}
.wrap{max-width:1100px;margin:0 auto}
input,select,textarea,button{font-family:var(--sans)}
input[type=text],input[type=password],input[type=number],select{height:34px;font-size:13px;border-radius:var(--r1);border:0.5px solid var(--b2);background:var(--bg2);color:var(--t1);padding:0 10px;width:100%}
textarea{font-size:13px;border-radius:var(--r1);border:0.5px solid var(--b2);background:var(--bg2);color:var(--t1);padding:7px 10px;width:100%;height:60px;resize:vertical}
input:focus,select:focus,textarea:focus{outline:none;border-color:#D4537E;box-shadow:0 0 0 2px rgba(212,83,126,.15)}
.btn{display:inline-flex;align-items:center;gap:5px;padding:6px 13px;font-size:12px;border:0.5px solid var(--b2);border-radius:var(--r1);background:transparent;color:var(--t1);cursor:pointer;transition:all .15s;white-space:nowrap}
.btn:hover{background:var(--bg2)}
.bp{background:#D4537E;color:#fff;border-color:#D4537E}.bp:hover{background:#993556}
.bsm{padding:3px 9px;font-size:11px}
.bd{color:#A32D2D;border-color:transparent}.bd:hover{background:#FCEBEB}
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:500}
.bok{background:#EAF3DE;color:#3B6D11}.blow{background:#FAEEDA;color:#854F0B}.bout{background:#FCEBEB;color:#A32D2D}
.bnew{background:#EEEDFE;color:#3C3489}.bsent{background:#E1F5EE;color:#085041}.bdone{background:#EAF3DE;color:#27500A}
.badm{background:#FBEAF0;color:#72243E}.bstr{background:#E6F1FB;color:#0C447C}.bmgr{background:#EEF6E8;color:#2E6B0A}
.met{background:var(--bg2);border-radius:var(--r1);padding:.8rem 1rem}
.met-l{font-size:11px;color:var(--t2);margin-bottom:3px}.met-v{font-size:20px;font-weight:500}
.panel{background:var(--bg1);border:0.5px solid var(--b3);border-radius:var(--r2);overflow:hidden;margin-bottom:.9rem}
.ph{padding:10px 14px;border-bottom:0.5px solid var(--b3);display:flex;align-items:center;justify-content:space-between;gap:8px;flex-wrap:wrap}
.pht{font-size:13px;font-weight:500}
.tw{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:12px;table-layout:fixed}
thead th{padding:7px 12px;text-align:left;color:var(--t2);font-weight:400;border-bottom:0.5px solid var(--b3);white-space:nowrap}
tbody td{padding:7px 12px;border-bottom:0.5px solid var(--b3);vertical-align:middle;overflow:hidden;text-overflow:ellipsis}
tbody tr:last-child td{border-bottom:none}
tbody tr:hover{background:var(--bg2)}
.tabs{display:flex;gap:3px;background:var(--bg2);border-radius:var(--r1);padding:3px;border:0.5px solid var(--b3);flex-wrap:wrap;margin-bottom:1rem}
.tab{padding:5px 11px;font-size:12px;border:none;background:transparent;color:var(--t2);border-radius:6px;cursor:pointer;transition:all .15s}
.tab.on{background:var(--bg1);color:var(--t1);font-weight:500;border:0.5px solid var(--b3)}
.barcell{display:flex;align-items:center;gap:5px}
.barbg{flex:1;height:5px;background:var(--bg2);border-radius:3px;min-width:35px}
.barfill{height:5px;border-radius:3px}
.mover{position:fixed;inset:0;background:rgba(0,0,0,.45);display:flex;align-items:center;justify-content:center;z-index:999}
.mbox{background:var(--bg1);border-radius:var(--r2);border:0.5px solid var(--b3);padding:1.4rem;width:420px;max-width:95vw;max-height:90vh;overflow-y:auto}
.mbox h3{font-size:15px;font-weight:500;margin-bottom:1rem}
.fr{margin-bottom:10px}
.fr label{display:block;font-size:11px;color:var(--t2);margin-bottom:3px}
.fa{display:flex;gap:7px;justify-content:flex-end;margin-top:1rem}
.ai{display:flex;align-items:center;justify-content:space-between;padding:9px 11px;border-radius:var(--r1);margin-bottom:7px;font-size:12px}
.alow{background:#FAEEDA;border:0.5px solid #FAC775}
.aout{background:#FCEBEB;border:0.5px solid #F7C1C1}
.lcwrap{display:flex;align-items:center;justify-content:center;min-height:80vh}
.lcbox{background:var(--bg1);border:0.5px solid var(--b3);border-radius:var(--r2);padding:2rem;width:340px;max-width:95vw}
.lbtn{padding:3px 10px;font-size:11px;border-radius:20px;border:0.5px solid var(--b2);background:transparent;color:var(--t2);cursor:pointer;transition:all .15s}
.lbtn.on{background:#D4537E;color:#fff;border-color:#D4537E}
.loading{display:flex;align-items:center;justify-content:center;padding:3rem;color:var(--t2);font-size:13px;gap:10px}
.spinner{width:18px;height:18px;border:2px solid var(--b3);border-top-color:#D4537E;border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.toast{position:fixed;bottom:1.5rem;right:1.5rem;background:var(--bg1);border:0.5px solid var(--b3);border-radius:var(--r1);padding:10px 16px;font-size:12px;z-index:9999;box-shadow:0 2px 12px rgba(0,0,0,.12)}
.toast.err{border-color:#E24B4A;color:#A32D2D}
.chat-bubble{display:flex;flex-direction:column;margin-bottom:8px}
.chat-msg{padding:7px 11px;border-radius:12px;font-size:12px;max-width:78%;word-break:break-word}
</style>

// Session persistence - restore session if within 1 hour
function getSavedSession(){
  try{
    const raw=localStorage.getItem('appSession');
    if(!raw)return null;
    const{session,savedAt}=JSON.parse(raw);
    if(Date.now()-savedAt<60*60*1000)return session; // 1 hour
    localStorage.removeItem('appSession');
  }catch(e){}
  return null;
}
function saveSession(session){
  try{localStorage.setItem('appSession',JSON.stringify({session,savedAt:Date.now()}))}catch(e){}
}
function clearSession(){
  try{localStorage.removeItem('appSession')}catch(e){}
}

async function api(path,opts={},notify=null){
  const url=SB+'/rest/v1/'+path;
  const isDelete=opts.method==='DELETE';
  const headers={'Content-Type':'application/json'};
  if(!isDelete)headers['Prefer']='return=representation';
  if(S.session){
    headers['X-User-Role']=S.session.role||'guest';
    if(S.session.store_id)headers['X-User-Store']=String(S.session.store_id);
  }
  if(notify)headers['X-Notify']=JSON.stringify(notify);
  const res=await fetch(url,{...opts,headers});
  if(!res.ok){const e=await res.text();throw new Error(e)}
  const txt=await res.text();
  return txt?JSON.parse(txt):null;
}

async function loadAll(){
  S.loading=true;render();
  const cid=S.company?.id;
  const companyFilter=cid?`&company_id=eq.${cid}`:'';
  try{
    const[stores,products,stockRows,orders,orderItems,accounts,messages,complaints,orderHistory,complaintMsgs,attendance,stockHistory,weeklyRequests]=await Promise.all([
      api('stores?order=id'+companyFilter),api('products?order=name'),api('stock?select=*'),
      api('orders?order=id.desc'),api('order_items?select=*'),
      api('accounts?order=username'+companyFilter),api('messages?order=created_at'),
      api('complaints?order=id.desc'),
      api('order_history?order=created_at.desc'),
      api('complaint_messages?order=created_at'),
      api('attendance?order=logged_in_at.desc&login_date=eq.'+today()),
      api('stock_history?order=changed_at.desc&limit=200'),
      api('weekly_product_requests?order=quantity.desc'),
    ]);
    S.stores=stores||[];S.products=products||[];
    S.stock={};(stockRows||[]).forEach(r=>{S.stock[r.store_id+'-'+r.product_id]=r.quantity});
    S.orders=orders||[];S.orderItems=orderItems||[];
    S.accounts=accounts||[];S.messages=messages||[];
    S.complaints=complaints||[];
    S.orderHistory=orderHistory||[];
    S.complaintMsgs=complaintMsgs||[];
    S.attendance=attendance||[];
    S.stockHistory=stockHistory||[];
    S.weeklyRequests=weeklyRequests||[];
  }catch(e){showToast('❌ '+e.message,'err')}
  S.loading=false;render();
}

const qty=(sid,pid)=>S.stock[sid+'-'+pid]??0;
const storeTotal=sid=>S.products.reduce((a,p)=>a+qty(sid,p.id),0);
const storeItems=sid=>S.products.filter(p=>qty(sid,p.id)>0).length;
const totalAll=()=>{let x=0;S.products.forEach(p=>S.stores.forEach(s=>{x+=qty(s.id,p.id)}));return x};
const allLow=()=>{let c=0;S.products.forEach(p=>S.stores.forEach(s=>{const q=qty(s.id,p.id);if(p.min_stock>0&&q>0&&q<p.min_stock)c++}));return c};
const allOut=()=>{let c=0;S.products.forEach(p=>S.stores.forEach(s=>{if(p.min_stock>0&&qty(s.id,p.id)===0)c++}));return c};
const openReqs=()=>(S.orders||[]).filter(o=>o.status==='new'||o.status==='sent').length;

function sbadge(q,min){const l=t();if(min===0)return`<span class="badge bok">${l.ok}</span>`;return q===0?`<span class="badge bout">${l.outLbl}</span>`:q<min?`<span class="badge blow">${l.lowLbl}</span>`:`<span class="badge bok">${l.ok}</span>`}
function rbadge(s){const l=t();return s==='new'?`<span class="badge bnew">${l.new}</span>`:s==='sent'?`<span class="badge bsent">${l.sent}</span>`:`<span class="badge bdone">${l.done}</span>`}

function showToast(msg,type='ok'){
  const el=document.createElement('div');el.className='toast '+(type||'');el.textContent=msg;
  document.body.appendChild(el);setTimeout(()=>el.remove(),2500);
}

function applyTheme(){
  const style=document.getElementById('theme-style');
  const isRejoes=S.company?.handle==='rejoes';
  
  // Show/hide rejoes background
  const rejesBg=document.getElementById('rejoes-bg');
  if(rejesBg)rejesBg.style.display=isRejoes?'block':'none';
  
  // Apply Rejoes theme class to body
  if(isRejoes){
    const isDayMode=!S.darkMode;
    if(S.session){
      document.body.classList.add('rejoes-app');
      document.body.classList.remove('rejoes-theme','rejoes-day');
      // Day/night for app
      if(isDayMode){
        document.body.classList.add('rejoes-day-app');
      }else{
        document.body.classList.remove('rejoes-day-app');
      }
    }else{
      document.body.classList.remove('rejoes-app','rejoes-day-app');
      if(isDayMode){
        document.body.classList.add('rejoes-day');
        document.body.classList.remove('rejoes-theme');
      }else{
        document.body.classList.add('rejoes-theme');
        document.body.classList.remove('rejoes-day');
      }
    }
    document.body.style.background='';
  }else{
    document.body.classList.remove('rejoes-theme','rejoes-app','rejoes-day','rejoes-day-app');
  }

  if(style){
    if(isRejoes&&S.darkMode){
      style.textContent=`:root{--bg1:#1a0a2e;--bg2:#2d1660;--bg3:#0f0520;--t1:#e8e0f0;--t2:#C4A8E8;--t3:#8060a0;--b2:rgba(168,85,247,0.3);--b3:rgba(168,85,247,0.15);}`;
    }else if(isRejoes&&!S.darkMode){
      // Day mode for Rejoes app - white bg, purple text/accents
      style.textContent=`:root{--bg1:#ffffff;--bg2:#f8f4ff;--bg3:#ffffff;--t1:#1a0040;--t2:#6B3FA0;--t3:#9b7bc0;--b2:rgba(168,85,247,0.2);--b3:rgba(168,85,247,0.1);}`;
    }else if(S.darkMode){
      style.textContent=`:root{--bg1:#1e1e1e;--bg2:#2a2a2a;--bg3:#333;--t1:#e8e8e8;--t2:#a0a0a0;--t3:#6a6a6a;--b2:rgba(255,255,255,0.2);--b3:rgba(255,255,255,0.1);}`;
    }else{
      style.textContent=`:root{--bg1:#fff;--bg2:#f5f5f3;--bg3:#eeede9;--t1:#1a1a1a;--t2:#6b6b6b;--t3:#9b9b9b;--b2:rgba(0,0,0,0.2);--b3:rgba(0,0,0,0.1);}`;
    }
  }
}

function toggleDarkMode(){
  S.darkMode=!S.darkMode;
  localStorage.setItem('darkMode',S.darkMode);
  applyTheme();
  render();
}

function render(){
  if(S.session)saveSession(S.session);
  applyTheme();
  let html;
  if(S.loading){
    html=`<div class="loading"><div class="spinner"></div>${t().loading}</div>`;
  }else if(S.screen==='portal'){
    html=buildPortal();
  }else if(S.screen==='login'){
    html=S.session?buildApp():buildLogin();
  }else{
    html=buildApp();
  }
  g('root').innerHTML=html;
  bind();if(!S.loading&&S.modal)bindModal();
  if(S.modal&&(S.modal.type==='chat'||S.modal.type==='complaint-chat')){setTimeout(()=>{const el=g('chat-msgs');if(el)el.scrollTop=el.scrollHeight},50)}
}
function renderKeepFocus(focusId){
  const val=focusId?gv(focusId):'';render();
  if(focusId){const e=g(focusId);if(e){e.focus();e.value=val;e.setSelectionRange(val.length,val.length)}}
}

function bStock(){
  const l=t();
  const cols=S.filterStore==='all'?S.stores:S.stores.filter(s=>s.id===parseInt(S.filterStore));
  const maxQ=Math.max(1,...S.products.flatMap(p=>S.stores.map(s=>qty(s.id,p.id))));
  const filtered=S.products.filter(p=>{
    if(S.search&&!p.name.toLowerCase().includes(S.search.toLowerCase())&&!p.sku.toLowerCase().includes(S.search.toLowerCase()))return false;
    if(S.filterStore!=='all'){const sid=parseInt(S.filterStore),q=qty(sid,p.id);if(S.filterStatus==='low'&&!(q>0&&q<p.min_stock))return false;if(S.filterStatus==='out'&&q!==0)return false}
    return true;
  });
  const show=cols.slice(0,5),extra=cols.length-show.length;
  return`<div class="panel">
  <div class="ph"><span class="pht">${l.stockOv}</span>
    <div style="display:flex;gap:7px;flex-wrap:wrap;align-items:center">
      <input type="text" id="srch" placeholder="${l.search}" value="${S.search}" style="width:130px;height:30px;font-size:12px">
      <select id="fstore" style="height:30px;font-size:12px"><option value="all">${l.allStores}</option>${S.stores.map(s=>`<option value="${s.id}" ${S.filterStore==s.id?'selected':''}>${s.name}</option>`).join('')}</select>
      <select id="fstatus" style="height:30px;font-size:12px"><option value="all">${l.allSt}</option><option value="low">${l.low}</option><option value="out">${l.outSt}</option></select>
    </div>
  </div>
  <div class="tw"><table>
    <colgroup><col style="width:160px"><col style="width:70px">${show.map(()=>'<col style="width:115px">').join('')}${extra?'<col style="width:70px">':''}<col style="width:58px"><col style="width:60px"></colgroup>
    <thead><tr><th>${l.product}</th><th>${l.sku}</th>${show.map(s=>`<th title="${s.name}">${s.name}</th>`).join('')}${extra?`<th>+${extra}</th>`:''}<th>${l.totalLbl}</th><th>${l.status}</th></tr></thead>
    <tbody>${filtered.length?filtered.map(p=>{
      const tot=S.stores.reduce((a,s)=>a+qty(s.id,p.id),0);
      return`<tr>
        <td><div style="font-weight:500">${p.name}</div><div style="font-size:10px;color:var(--t3)">${p.category}·${p.size}kg</div></td>
        <td style="color:var(--t2)">${p.sku}</td>
        ${show.map(s=>{const q=qty(s.id,p.id),pct=Math.round(q/maxQ*100),c=barCol(q,p.min_stock);
          return`<td><div class="barcell"><span style="min-width:26px;text-align:right;font-weight:500;color:${p.min_stock>0&&q===0?RED:p.min_stock>0&&q<p.min_stock?AMBER:'var(--t1)'}">${q}</span><div class="barbg"><div class="barfill" style="width:${pct}%;background:${c}"></div></div></div>
          <span class="elk" data-edit="${s.id}-${p.id}" style="font-size:10px;color:var(--t3);cursor:pointer">${l.edit.toLowerCase()}</span>
          <span class="rlk" data-req="${s.id}-${p.id}" style="font-size:10px;color:#7F77DD;cursor:pointer;margin-left:4px">${l.req}</span>
          <span class="shlk" data-sid="${s.id}" data-pid="${p.id}" style="font-size:10px;color:#639922;cursor:pointer;margin-left:4px">📋</span></td>`;
        }).join('')}
        ${extra?`<td style="color:var(--t3);font-size:11px">${l.useFilter}</td>`:''}
        <td style="font-weight:500">${tot}</td><td>${sbadge(tot,p.min_stock)}</td>
      </tr>`;
    }).join(''):`<tr><td colspan="20" style="text-align:center;padding:2rem;color:var(--t3)">${l.noProducts}</td></tr>`}

</div>`}

  S.products.forEach(p=>S.stores.forEach(s=>{const q=qty(s.id,p.id);if(p.min_stock>0&&q===0)items.push({type:'out',s,p,q});else if(p.min_stock>0&&q<p.min_stock)items.push({type:'low',s,p,q})}));

function bWeeklyRequests(){
  const weekStart=getWeekStart();
  const thisWeek=[...(S.weeklyRequests||[])].filter(r=>r.week_start===weekStart).sort((a,b)=>b.quantity-a.quantity);
  const maxQty=Math.max(1,...thisWeek.map(r=>r.quantity));
  const totalQty=thisWeek.reduce((a,r)=>a+r.quantity,0);

  const nextReset=getNextSunday();
  const now=new Date();
  const diff=nextReset-now;
  const days=Math.floor(diff/(1000*60*60*24));
  const hours=Math.floor((diff%(1000*60*60*24))/(1000*60*60));
  const mins=Math.floor((diff%(1000*60*60))/(1000*60));
  const resetStr=days>0?`${days}d ${hours}u`:`${hours}u ${mins}m`;

  const colors=['#D4537E','#E07B39','#E0B939','#639922','#4A90D9','#9B59B6','#1ABC9C','#E74C3C','#F39C12','#2ECC71'];

  // Build pie chart SVG
  const size=180;
  const cx=size/2,cy=size/2,r=75,innerR=40;
  let slices='';
  let angle=-90;
  thisWeek.slice(0,10).forEach((item,i)=>{
    const pct=item.quantity/totalQty;
    const startAngle=angle;
    const endAngle=angle+pct*360;
    const s=angle*(Math.PI/180);
    const e=endAngle*(Math.PI/180);
    const x1=cx+r*Math.cos(s),y1=cy+r*Math.sin(s);
    const x2=cx+r*Math.cos(e),y2=cy+r*Math.sin(e);
    const ix1=cx+innerR*Math.cos(s),iy1=cy+innerR*Math.sin(s);
    const ix2=cx+innerR*Math.cos(e),iy2=cy+innerR*Math.sin(e);
    const large=pct>0.5?1:0;
    const col=colors[i%colors.length];
    slices+=`<path d="M${ix1},${iy1} L${x1},${y1} A${r},${r} 0 ${large},1 ${x2},${y2} L${ix2},${iy2} A${innerR},${innerR} 0 ${large},0 ${ix1},${iy1}" fill="${col}" stroke="var(--bg1)" stroke-width="1.5" opacity="0.9"/>`;
    angle=endAngle;
  });

  return`<div>
  <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:8px;margin-bottom:1rem">
    <div class="met"><div class="met-l">Producten aangevraagd</div><div class="met-v">${thisWeek.length}</div></div>
    <div class="met"><div class="met-l">Totaal stuks</div><div class="met-v">${totalQty}</div></div>
    <div class="met"><div class="met-l">Reset over</div><div class="met-v" style="font-size:15px">${resetStr}</div></div>
    <div class="met"><div class="met-l">Week van</div><div class="met-v" style="font-size:14px">${weekStart}</div></div>
  </div>

  <div style="display:grid;grid-template-columns:${thisWeek.length?'220px 1fr':'1fr'};gap:12px;align-items:start;margin-bottom:1rem">
    ${thisWeek.length?`<div class="panel" style="padding:1rem;display:flex;flex-direction:column;align-items:center">
      <div style="font-size:12px;font-weight:500;color:var(--t2);margin-bottom:10px">Verdeling</div>
      <svg viewBox="0 0 ${size} ${size}" width="${size}" height="${size}">
        ${slices}
        <text x="${cx}" y="${cy}" text-anchor="middle" dominant-baseline="middle" font-size="11" fill="var(--t2)">${thisWeek.length} prod.</text>
      </svg>
      <div style="display:flex;flex-wrap:wrap;gap:4px;margin-top:10px;justify-content:center">

function bAttendance(){
  const todayStr=today();

function bStoreDetail(store,l){
  const maxQ=Math.max(1,...S.products.map(p=>qty(store.id,p.id)));
  const sw=S.storeSearch||'';
  const sf=S.storeStatusFilter||'all';
  const sorted=[...S.products].sort((a,b)=>a.name.localeCompare(b.name)).filter(p=>{
    if(sw&&!p.name.toLowerCase().includes(sw.toLowerCase())&&!p.sku.toLowerCase().includes(sw.toLowerCase())&&!p.category.toLowerCase().includes(sw.toLowerCase()))return false;
    if(sf==='low'){const q=qty(store.id,p.id);return p.min_stock>0&&q>0&&q<p.min_stock}
    if(sf==='out'){const q=qty(store.id,p.id);return p.min_stock>0&&q===0}
    if(sf==='ok'){const q=qty(store.id,p.id);return p.min_stock===0||(q>=p.min_stock)}
    return true;
  });
  return`<div>
  <div style="display:flex;align-items:center;gap:10px;margin-bottom:1rem;flex-wrap:wrap">
    <button class="btn bsm" id="back-stores-btn">← ${t().back}</button>
    <span style="font-size:16px;font-weight:500">${store.name}</span>
    <span style="font-size:13px;color:var(--t2)">${store.city}</span>
    <span class="badge bstr">${storeTotal(store.id)} stuks</span>
  </div>
  <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(110px,1fr));gap:8px;margin-bottom:1rem">
    <div class="met"><div class="met-l">${l.total}</div><div class="met-v">${storeTotal(store.id)}</div></div>
    <div class="met"><div class="met-l">${l.inStock}</div><div class="met-v">${storeItems(store.id)}</div></div>
    <div class="met"><div class="met-l" style="color:#854F0B">${l.lowStock}</div><div class="met-v" style="color:${AMBER}">${S.products.filter(p=>p.min_stock>0&&qty(store.id,p.id)>0&&qty(store.id,p.id)<p.min_stock).length}</div></div>
    <div class="met"><div class="met-l" style="color:#A32D2D">${l.outOfStock}</div><div class="met-v" style="color:${RED}">${S.products.filter(p=>p.min_stock>0&&qty(store.id,p.id)===0).length}</div></div>
  </div>
  <div class="panel">
    <div class="ph">
      <span class="pht">${l.stockOv} — ${store.name}</span>
      <div style="display:flex;gap:7px;align-items:center;flex-wrap:wrap">
        <input type="text" id="store-srch" placeholder="${l.search}" value="${sw}" style="width:130px;height:30px;font-size:12px">
        <select id="store-sf" style="height:30px;font-size:12px">
          <option value="all" ${sf==='all'?'selected':''}>${l.allSt}</option>
          <option value="ok" ${sf==='ok'?'selected':''}>${l.ok}</option>
          <option value="low" ${sf==='low'?'selected':''}>${l.low}</option>
          <option value="out" ${sf==='out'?'selected':''}>${l.outSt}</option>
        </select>
        <button class="btn bsm" onclick="showExportModal('store',${store.id})">📤 Voorraad</button>
        <button class="btn bd bsm" onclick="confirmStockReset(${store.id},'${store.name}')">🔄 Reset stock</button>
        <button class="btn bsm" onclick="showExportModal('storeorders',${store.id})">📤 Orders</button>
      </div>
    </div>
    <div class="tw"><table>
      <colgroup><col style="width:180px"><col style="width:80px"><col style="width:100px"><col style="width:60px"><col style="width:120px"><col style="width:65px"><col style="width:75px"></colgroup>
      <thead><tr><th>${l.product}</th><th>${l.sku}</th><th>${l.cat}</th><th>${l.size} (kg)</th><th>${l.stockTab}</th><th>${l.min}</th><th>${l.status}</th></tr></thead>
      <tbody>${sorted.length?sorted.map(p=>{
        const q=qty(store.id,p.id),pct=Math.round(q/maxQ*100),c=barCol(q,p.min_stock);
        return`<tr>
          <td style="font-weight:500">${p.name}</td>
          <td style="color:var(--t2)">${p.sku}</td>
          <td>${p.category}</td>
          <td>${p.size}</td>
          <td><div class="barcell"><span style="min-width:28px;text-align:right;font-weight:500;color:${p.min_stock>0&&q===0?RED:p.min_stock>0&&q<p.min_stock?AMBER:'var(--t1)'}">${q}</span><div class="barbg"><div class="barfill" style="width:${pct}%;background:${c}"></div></div></div></td>
          <td style="color:var(--t2)">${p.min_stock}</td>
          <td>${sbadge(q,p.min_stock)}</td>
        </tr>`;
      }).join(''):`<tr><td colspan="7" style="text-align:center;padding:1.5rem;color:var(--t3)">${l.noProducts}</td></tr>`}

  </div>

      <tbody>${S.products.map(p=>{

          <td><div style="font-weight:500">${p.name}</div><div style="font-size:10px;color:var(--t3)">${p.sku}·${p.size}kg</div></td>

        <td><button class="btn bsm cchat" data-id="${c.id}">💬${(S.complaintMsgs||[]).filter(m=>m.complaint_id===c.id&&m.from_account==='admin'&&!m.is_read).length?` <span style="background:#D4537E;color:#fff;border-radius:10px;padding:0 4px;font-size:10px">${(S.complaintMsgs||[]).filter(m=>m.complaint_id===c.id&&m.from_account==='admin'&&!m.is_read).length}</span>`:''}</button></td>
      </tr>`).join(''):`<tr><td colspan="6" style="text-align:center;padding:1.5rem;color:var(--t3)">Geen klachten ingediend</td></tr>`}

async function doLogin(){
  const l=t(),u=gv('lu'),p=gv('lp');
  if(!u||!p){S.loginErr=l.loginErr;render();return;}
  
  // First try Supabase Auth (email-based)
  // Build email from username: username@company.handle.nl
  const email=u.includes('@')?u.toLowerCase():`${u.toLowerCase()}@${S.company?.handle||'rejoes'}.nl`;
  
  try{
    const authData=await authLogin(email, p);
    S.accessToken=authData.access_token;
    
    // Find matching account by auth_id
    const authUser=authData.user;
    let acc=S.accounts.find(x=>x.auth_id===authUser.id);
    
    // Fallback: find by username (for accounts not yet linked)
    if(!acc) acc=S.accounts.find(x=>x.username===u);
    
    if(acc){
      S.session=acc;
      saveSession({...acc, _accessToken: authData.access_token});
      localStorage.setItem('appCompany',JSON.stringify(S.company));
      S.screen='app';S.loginErr='';render();
      
      // Log attendance for store accounts
      if(acc.role==='store'&&acc.store_id){
        const todayStr=today();
        const alreadyLogged=S.attendance&&S.attendance.some(a=>a.account_id===acc.id&&a.login_date===todayStr);
        if(!alreadyLogged){
          api('attendance',{method:'POST',body:JSON.stringify({account_id:acc.id,store_id:acc.store_id,company_id:S.company?.id,login_date:todayStr})})
            .then(res=>{if(res&&res[0])S.attendance=[res[0],...(S.attendance||[])]})
            .catch(()=>{});
        }
      }
      if(acc.role==='admin'){
        setTimeout(()=>{lastOrderCount=S.orders.length;lastMsgCount=(S.messages||[]).filter(m=>m.from_account!=='admin'&&!m.is_read).length;startPolling();requestNotificationPermission();
        requestPushPermission();},2000);
      }
    }else{
      S.loginErr=l.loginErr;S.loginUser=u;S.loginPass=p;render();
    }
  }catch(e){
    // Fallback to old password check for accounts not yet in Supabase Auth
    const acc=S.accounts.find(x=>x.username===u&&x.password===p);
    if(acc){
      S.session=acc;
      saveSession(acc);
      localStorage.setItem('appCompany',JSON.stringify(S.company));
      S.screen='app';S.loginErr='';render();
      if(acc.role==='store'&&acc.store_id){
        const todayStr=today();
        const alreadyLogged=S.attendance&&S.attendance.some(a=>a.account_id===acc.id&&a.login_date===todayStr);
        if(!alreadyLogged){
          api('attendance',{method:'POST',body:JSON.stringify({account_id:acc.id,store_id:acc.store_id,company_id:S.company?.id,login_date:todayStr})})
            .then(res=>{if(res&&res[0])S.attendance=[res[0],...(S.attendance||[])]})
            .catch(()=>{});
        }
      }
      if(acc.role==='admin'){
        setTimeout(()=>{lastOrderCount=S.orders.length;lastMsgCount=(S.messages||[]).filter(m=>m.from_account!=='admin'&&!m.is_read).length;startPolling();requestNotificationPermission();
        requestPushPermission();},2000);
      }
    }else{
      S.loginErr=l.loginErr;S.loginUser=u;S.loginPass=p;render();
    }
  }
}

function filterByPeriod(items, dateField, period) {
  const now = new Date();
  const start = new Date();
  if (period === 'day') start.setHours(0,0,0,0);
  else if (period === 'week') { start.setDate(now.getDate() - now.getDay()); start.setHours(0,0,0,0); }
  else if (period === 'month') start.setDate(1), start.setHours(0,0,0,0);
  else if (period === 'year') { start.setMonth(0,1); start.setHours(0,0,0,0); }
  else return items; // 'all'
  return items.filter(item => new Date(item[dateField]) >= start);
}

function exportToExcel(sheets, filename) {
  const wb = XLSX.utils.book_new();
  sheets.forEach(({name, data}) => {
    const ws = XLSX.utils.aoa_to_sheet(data);
    // Style header row
    const range = XLSX.utils.decode_range(ws['!ref']);
    for(let C = range.s.c; C <= range.e.c; C++) {
      const cell = ws[XLSX.utils.encode_cell({r:0, c:C})];
      if(cell) cell.s = {font:{bold:true}, fill:{fgColor:{rgb:'D4537E'}}};
    }
    XLSX.utils.book_append_sheet(wb, ws, name.substring(0,31));
  });
  XLSX.writeFile(wb, filename+'.xlsx');
}

function exportToPDF(title, columns, rows, filename) {
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({orientation: rows.length > 5 ? 'landscape' : 'portrait'});
  
  // Header
  doc.setFillColor(212, 83, 126);
  doc.rect(0, 0, doc.internal.pageSize.width, 20, 'F');
  doc.setTextColor(255, 255, 255);
  doc.setFontSize(14);
  doc.setFont('helvetica', 'bold');
  doc.text(title, 14, 13);
  doc.setFontSize(9);
  doc.text(new Date().toLocaleDateString('nl-NL', {weekday:'long',day:'numeric',month:'long',year:'numeric'}), doc.internal.pageSize.width - 14, 13, {align:'right'});
  
  // Company name
  if(S.company) {
    doc.setFontSize(10);
    doc.text(S.company.name, 14, 18);
  }

  doc.autoTable({
    head: [columns],
    body: rows,
    startY: 25,
    styles: {fontSize: 9, cellPadding: 3},
    headStyles: {fillColor: [212, 83, 126], textColor: 255, fontStyle: 'bold'},
    alternateRowStyles: {fillColor: [245, 245, 243]},
    margin: {left: 14, right: 14},
  });
  
  doc.save(filename+'.pdf');
}

// Export orders
function exportOrders(period, orderId) {
  let orders = orderId ? S.orders.filter(o=>o.id===orderId) : filterByPeriod(S.orders, 'created_at', period);
  const periodLabel = {day:t().today,week:t().thisWeek,month:t().thisMonth,year:t().thisYear,all:t().allTime,single:'Order'}[period||'all'];
  const filename = `Orders_${periodLabel}_${today()}`;
  
  const rows = orders.map(o => {
    const st = S.stores.find(x=>x.id===o.store_id);
    const items = (S.orderItems||[]).filter(i=>i.order_id===o.id);
    const itemsStr = items.map(i=>{const p=S.products.find(x=>x.id===i.product_id);return p?`${p.name} x${i.quantity}`:''}).filter(Boolean).join(', ');
    const orderNum = String(o.order_number||o.id).padStart(4,'0');
    return [`#${orderNum}`, o.created_at, st?st.name:'—', itemsStr, o.note||'', o.status==='new'?'Nieuw':o.status==='sent'?'Verzonden':'Klaar'];
  });

  const cols = ['Order #','Datum','Winkel','Producten','Notitie','Status'];
  const title = orderId ? `Order #${String(orderId).padStart(4,'0')}` : `Orders — ${periodLabel}`;

  if(S.exportFormat==='excel') {
    exportToExcel([{name:'Orders', data:[cols,...rows]}], filename);
  } else {
    exportToPDF(title, cols, rows, filename);
  }
}

function getWeekStart(){
  const now=new Date();
  const day=now.getDay(); // 0=Sunday
  const diff=now.getDate()-day+(day===0?-6:1); // Monday
  const monday=new Date(now.setDate(diff));
  return monday.toISOString().slice(0,10);
}

function getNextSunday(){
  const now=new Date();
  const day=now.getDay();
  const diff=day===0?0:7-day;
  const sunday=new Date();
  sunday.setDate(now.getDate()+diff);
  sunday.setHours(23,59,0,0);
  return sunday;
}

async function checkWeeklyReset(){
  // Check if it's Sunday after 23:59 and reset if needed
  const now=new Date();
  if(now.getDay()===0){ // Sunday
    const hours=now.getHours();
    const mins=now.getMinutes();
    if(hours===23&&mins>=59){
      // Reset all weekly requests
      try{
        await api('weekly_product_requests',{method:'DELETE',headers:{}});
        S.weeklyRequests=[];
        showToast('✓ Wekelijkse statistieken gereset');
      }catch(e){}
    }
  }
}

async function logWeeklyRequest(orderItems){
  const weekStart=getWeekStart();
  for(const item of orderItems){
    const p=S.products.find(x=>x.id===item.product_id);
    if(!p)continue;
    // Check if entry exists for this product this week
    const existing=(S.weeklyRequests||[]).find(r=>r.product_id===item.product_id&&r.week_start===weekStart);
    try{
      if(existing){
        const newQty=existing.quantity+item.quantity;
        await api(`weekly_product_requests?id=eq.${existing.id}`,{method:'PATCH',body:JSON.stringify({quantity:newQty})});
        existing.quantity=newQty;
      }else{
        const[nr]=await api('weekly_product_requests',{method:'POST',body:JSON.stringify({product_id:item.product_id,product_name:p.name,product_sku:p.sku,quantity:item.quantity,week_start:weekStart})});
        if(nr)(S.weeklyRequests=S.weeklyRequests||[]).push(nr);
      }
    }catch(e){}
  }
}

async function lookupCompany(handle){
  if(!handle.trim()){S.handleErr='Voer een bedrijfsnaam in.';render();return;}
  try{
    const results=await api(`companies?handle=eq.${handle.trim().toLowerCase()}`);
    if(results&&results.length>0){
      S.company=results[0];
      S.handleErr='';
      S.screen='login';
      // Check for saved session for this company
      const saved=getSavedSession();
      if(saved&&saved.company_id===S.company.id){S.session=saved;}
      render();
      loadAll();
    }else{
      S.handleErr=`Bedrijf "${handle}" niet gevonden.`;
      render();
    }
  }catch(e){S.handleErr='Fout bij zoeken. Probeer opnieuw.';render();}
}

function bindModal(){
  const mo=g('mo');if(mo)mo.addEventListener('click',e=>{if(e.target===mo){S.modal=null;render()}});
  const mc=g('mc');if(mc)mc.addEventListener('click',()=>{S.modal=null;render()});

  const ss=g('ss');if(ss)ss.addEventListener('click',async()=>{
    const sid=S.modal.storeId,pid=S.modal.productId,nq=parseInt(gv('m-qty'));
    const newQty=isNaN(nq)?0:nq;
    const oldQty=qty(sid,pid);
    S.modal=null;render();
    try{
      const ex=await api(`stock?store_id=eq.${sid}&product_id=eq.${pid}`);
      if(ex&&ex.length){await api(`stock?store_id=eq.${sid}&product_id=eq.${pid}`,{method:'PATCH',body:JSON.stringify({quantity:newQty})})}
      else{await api('stock',{method:'POST',body:JSON.stringify({store_id:sid,product_id:pid,quantity:newQty})})}
      S.stock[sid+'-'+pid]=newQty;
      // Log stock history
      const[sh]=await api('stock_history',{method:'POST',body:JSON.stringify({store_id:sid,product_id:pid,account_id:S.session?.id,old_quantity:oldQty,new_quantity:newQty})});
      if(sh)(S.stockHistory=S.stockHistory||[]).unshift(sh);
      showToast('✓ '+t().saved);render();
    }catch(e){showToast('❌ '+t().errSave,'err')}
  });

  const sorder=g('sorder');if(sorder)sorder.addEventListener('click',async()=>{
    const isEdit=S.modal.type==='edit-order';
    const sid=parseInt(g('m-store').value);
    const note=gv('m-note');
    const rows=[...document.querySelectorAll('.req-row')].map((_,i)=>({
      product_id:parseInt(document.querySelectorAll('.rp-product')[i]?.value),
      quantity:parseInt(document.querySelectorAll('.rp-qty')[i]?.value)||1
    })).filter(r=>r.product_id);
    if(!rows.length)return;
    const oid=isEdit?S.modal.order.id:null;
    S.modal=null;render();
    try{
      if(isEdit){
        // Update existing order
        await api(`orders?id=eq.${oid}`,{method:'PATCH',body:JSON.stringify({store_id:sid,note})});
        await api(`order_items?order_id=eq.${oid}`,{method:'DELETE',headers:{}});
        const newItems=[];
        for(const r of rows){const[item]=await api('order_items',{method:'POST',body:JSON.stringify({order_id:oid,...r})});newItems.push(item)}
        const o=S.orders.find(x=>x.id===oid);if(o){o.store_id=sid;o.note=note;}
        S.orderItems=(S.orderItems||[]).filter(i=>i.order_id!==oid);S.orderItems.push(...newItems);
        await logOrderHistory(oid,`✏️ Order aangepast door ${S.session.display_name||S.session.username}`);
        showToast('✓ '+t().saved);render();
      }else{
        // Check if there is already an open order for this store
        const existingOrder=S.orders.find(o=>o.store_id===sid&&o.status==='new');
        if(existingOrder){
          // Merge into existing order - add/update products
          const existingItems=(S.orderItems||[]).filter(i=>i.order_id===existingOrder.id);
          for(const r of rows){
            const existing=existingItems.find(i=>i.product_id===r.product_id);
            if(existing){
              // Add quantity to existing item
              const newQty=existing.quantity+r.quantity;
              await api(`order_items?id=eq.${existing.id}`,{method:'PATCH',body:JSON.stringify({quantity:newQty})});
              existing.quantity=newQty;
            }else{
              // Add new product to existing order
              const[item]=await api('order_items',{method:'POST',body:JSON.stringify({order_id:existingOrder.id,...r})});
              S.orderItems.push(item);
            }
          }
          // Update note if provided
          if(note){
            const combined=existingOrder.note?existingOrder.note+' | '+note:note;
            await api(`orders?id=eq.${existingOrder.id}`,{method:'PATCH',body:JSON.stringify({note:combined})});
            existingOrder.note=combined;
          }
          showToast('✓ '+t().mergedOrder);render();
        }else{
          // Create new order
          const store=S.stores.find(s=>s.id===sid);
          const orderNotify={type:'order',storeName:store?store.name:'Winkel',orderNum:'????',items:rows.map(r=>{const p=S.products.find(x=>x.id===r.product_id);return{name:p?p.name:'?',qty:r.quantity}}),note};
          const[newOrder]=await api('orders',{method:'POST',body:JSON.stringify({store_id:sid,note,status:'new',created_at:today()})},orderNotify);
          if(newOrder)orderNotify.orderNum=String(newOrder.order_number||newOrder.id).padStart(4,'0');
          const newItems=[];
          for(const r of rows){const[item]=await api('order_items',{method:'POST',body:JSON.stringify({order_id:newOrder.id,...r})});newItems.push(item)}
          S.orders.unshift(newOrder);S.orderItems.push(...newItems);
          await logOrderHistory(newOrder.id,`📝 Order aangemaakt door ${S.session.display_name||S.session.username}`);
          await logWeeklyRequest(rows);
          if(S.session.role==='admin')S.adminSubTab='orders';
          showToast('✓ '+t().saved);render();
        }
      }
    }catch(e){showToast('❌ '+t().errSave,'err')}
  });

  const arb=g('add-row-btn');if(arb)arb.addEventListener('click',()=>{
    // Save current row values before re-render
    const currentRows=[...document.querySelectorAll('.req-row')].map((_,i)=>({
      productId:parseInt(document.querySelectorAll('.rp-product')[i]?.value)||S.products[0]?.id,
      qty:parseInt(document.querySelectorAll('.rp-qty')[i]?.value)||1
    }));
    // Save note and store
    const currentNote=gv('m-note');
    const currentStore=g('m-store')?g('m-store').value:null;
    S.modal.rows=[...currentRows,{productId:S.products[0]?.id,qty:1}];
    S.modal._savedNote=currentNote;
    S.modal._savedStore=currentStore;
    render();bindModal();
  });
  
  // Export modal handlers
  const fmtExcel=g('fmt-excel');if(fmtExcel)fmtExcel.addEventListener('click',()=>{S.exportFormat='excel';render();bindModal()});
  const fmtPdf=g('fmt-pdf');if(fmtPdf)fmtPdf.addEventListener('click',()=>{S.exportFormat='pdf';render();bindModal()});
  document.querySelectorAll('.period-btn').forEach(el=>el.addEventListener('click',()=>{S.modal.exportPeriod=el.dataset.period;render();bindModal()}));
  const doExp=g('do-export');
  if(doExp)doExp.addEventListener('click',()=>{
    const m=S.modal;
    const period=m.exportPeriod||'all';
    S.modal=null;render();
    if(m.exportType==='order') exportOrders(null, m.exportId);
    else if(m.exportType==='allorders') exportOrders(period, null);
    else if(m.exportType==='store') exportStore(m.exportId, period);
    else if(m.exportType==='storeorders') exportOrdersPerStore(m.exportId, period);
    else if(m.exportType==='allstores') exportAllStores(period);
    else if(m.exportType==='complaint') exportComplaints(null, m.exportId);
    else if(m.exportType==='allcomplaints') exportComplaints(period, null);
  });
  document.querySelectorAll('.rm-row').forEach(el=>el.addEventListener('click',()=>{
    const i=parseInt(el.dataset.i);
    // Save current row values before re-render
    const currentRows=[...document.querySelectorAll('.req-row')].map((_,j)=>({
      productId:parseInt(document.querySelectorAll('.rp-product')[j]?.value)||S.products[0]?.id,
      qty:parseInt(document.querySelectorAll('.rp-qty')[j]?.value)||1
    }));
    const currentNote=gv('m-note');
    const currentStore=g('m-store')?g('m-store').value:null;
    S.modal.rows=currentRows.filter((_,idx)=>idx!==i);
    S.modal._savedNote=currentNote;
    S.modal._savedStore=currentStore;
    render();bindModal();
  }));

  const sm=g('send-msg');
  if(sm){
    const sendMsg=async()=>{
      const inp=g('chat-inp');if(!inp||!inp.value.trim())return;
      const msg=inp.value.trim();inp.value='';
      const isComplaintChat=S.modal.type==='complaint-chat';
      try{
        let nm;
        if(isComplaintChat){
          [nm]=await api('complaint_messages',{method:'POST',body:JSON.stringify({from_account:S.session.id,complaint_id:S.modal.complaintId,message:msg,is_read:false})});
          (S.complaintMsgs=S.complaintMsgs||[]).push(nm);
        }else{
          [nm]=await api('messages',{method:'POST',body:JSON.stringify({from_account:S.session.id,order_id:S.modal.orderId,message:msg,is_read:false})});
          (S.messages=S.messages||[]).push(nm);
        }
        const chatEl=g('chat-msgs');
        if(chatEl){
          const isAdmin=S.session.role==='admin';
          const senderName=isAdmin?t().admin:(S.session.display_name||S.session.username);
          const ts=new Date().toLocaleTimeString('nl-NL',{hour:'2-digit',minute:'2-digit'});
          const div=document.createElement('div');
          div.className='chat-bubble';div.style.alignItems='flex-end';
          div.innerHTML=`<div class="chat-msg" style="background:#D4537E;color:#fff">${msg}</div><div style="font-size:10px;color:var(--t3);margin-top:2px">${senderName} · ${ts}</div>`;
          chatEl.appendChild(div);chatEl.scrollTop=chatEl.scrollHeight;
        }
      }catch(e){showToast('❌ '+t().errSave,'err')}
    };
    sm.addEventListener('click',sendMsg);
    const ci=g('chat-inp');if(ci)ci.addEventListener('keydown',e=>{if(e.key==='Enter')sendMsg()});
  }

  // Bulk import handlers
  const bib=g('bulk-import-btn');if(bib)bib.addEventListener('click',()=>{S.modal={type:'bulk-import'};render();});
  const dlTemplate=g('dl-template');
  if(dlTemplate)dlTemplate.addEventListener('click',()=>{
    const templateData=[
      ['naam','sku','categorie','gewicht_kg','minimum_voorraad'],
      ['Classic White Tee','APP-001','T-shirts','20','20'],
      ['Slim Fit Jeans','APP-002','Jeans','32','15'],
    ];
    exportToExcel([{name:'Producten',data:templateData}],'product_import_template');
  });
  const importFile=g('import-file');
  if(importFile)importFile.addEventListener('change',async(e)=>{
    const file=e.target.files[0];if(!file)return;
    const reader=new FileReader();
    reader.onload=function(ev){
      try{
        const wb=XLSX.read(ev.target.result,{type:'binary'});
        const ws=wb.Sheets[wb.SheetNames[0]];
        const rows=XLSX.utils.sheet_to_json(ws,{header:1});
        const dataRows=rows.slice(1).filter(r=>r[0]);
        const preview=g('import-preview');
        if(preview)preview.innerHTML=`<span style="color:#639922">✓ ${dataRows.length} producten gevonden — klik op Importeren</span>`;
        const doImport=g('do-import');
        if(doImport){doImport.style.display='inline-flex';doImport.dataset.rows=JSON.stringify(dataRows);}
      }catch(err){const p=g('import-preview');if(p)p.innerHTML='<span style="color:#A32D2D">❌ Fout bij lezen bestand</span>';}
    };
    reader.readAsBinaryString(file);
  });
  const doImport=g('do-import');
  if(doImport)doImport.addEventListener('click',async()=>{
    const rows=JSON.parse(doImport.dataset.rows||'[]');
    S.modal=null;render();
    let imported=0;
    for(const row of rows){
      try{
        const[np]=await api('products',{method:'POST',body:JSON.stringify({name:String(row[0]||''),sku:String(row[1]||''),category:String(row[2]||'Algemeen'),size:String(row[3]||'20'),min_stock:parseInt(row[4])||0})});
        if(np){S.products.push(np);imported++;}
      }catch(e){}
    }
    showToast(`✓ ${imported} producten geïmporteerd`);render();
  });
  const confirmReset=g('confirm-reset');
  if(confirmReset)confirmReset.addEventListener('click',async()=>{
    const storeId=S.modal.storeId;
    S.modal=null;render();
    await resetStoreStock(storeId);
  });

  const uprod=g('uprod');if(uprod)uprod.addEventListener('click',async()=>{
    const pid=S.modal.p.id;
    const minRaw=gv('m-min');const minVal=minRaw===''?0:parseInt(minRaw);
    const updated={name:gv('m-name'),sku:gv('m-sku'),category:gv('m-cat'),size:gv('m-size'),min_stock:isNaN(minVal)?0:minVal};
    S.modal=null;render();
    try{await api(`products?id=eq.${pid}`,{method:'PATCH',body:JSON.stringify(updated)});const p=S.products.find(x=>x.id===pid);if(p)Object.assign(p,updated);showToast('✓ '+t().saved);render()}catch(e){showToast('❌ '+t().errSave,'err')}
  });

  const ssto=g('ssto');if(ssto)ssto.addEventListener('click',async()=>{
    const n=gv('m-name'),c=gv('m-city');if(!n)return;S.modal=null;render();
    try{
      const[ns]=await api('stores',{method:'POST',body:JSON.stringify({name:n,city:c||n})});S.stores.push(ns);
      const uid='store'+ns.id;
      const[na]=await api('accounts',{method:'POST',body:JSON.stringify({id:uid,username:uid,password:uid+'pass',role:'store',store_id:ns.id,display_name:n})});
      S.accounts.push(na);showToast('✓ '+t().saved);render();
    }catch(e){showToast('❌ '+t().errSave,'err')}
  });

  const sp=g('sp');if(sp)sp.addEventListener('click',async()=>{
    const n=gv('m-name');if(!n)return;S.modal=null;render();
    const minRaw=gv('m-min');const minVal=minRaw===''?0:parseInt(minRaw);
    try{const[np]=await api('products',{method:'POST',body:JSON.stringify({name:n,sku:gv('m-sku')||'APP-???',category:gv('m-cat')||t().general,size:gv('m-size')||'20',min_stock:isNaN(minVal)?0:minVal})});S.products.push(np);showToast('✓ '+t().saved);render()}catch(e){showToast('❌ '+t().errSave,'err')}
  });

  const scomp=g('scomp');if(scomp)scomp.addEventListener('click',async()=>{
    const type=gv('m-ctype')||'general';
    const subject=gv('m-subject');
    const desc=gv('m-desc');
    if(!subject||!desc)return;
    S.modal=null;render();
    try{
      const cStore=S.stores.find(s=>s.id===S.session.store_id);
      const complaintNotify={type:'complaint',storeName:cStore?cStore.name:'Winkel',subject,description:desc,complaintType:type};
      const[nc]=await api('complaints',{method:'POST',body:JSON.stringify({store_id:S.session.store_id,type,subject,description:desc,status:'open',created_at:new Date().toISOString()})},complaintNotify);
      (S.complaints=S.complaints||[]).unshift(nc);
      showToast('✓ Klacht ingediend');render();
    }catch(e){showToast('❌ Fout bij opslaan','err')}
  });

  const uacc=g('uacc');if(uacc)uacc.addEventListener('click',async()=>{
    const aid=S.modal.a.id;
    const newName=gv('m-name');
    const newPass=gv('m-pass');
    const updated={display_name:newName||S.modal.a.display_name};
    if(newPass)updated.password=newPass;
    S.modal=null;render();
    try{
      await api(`accounts?id=eq.${aid}`,{method:'PATCH',body:JSON.stringify(updated)});
      const a=S.accounts.find(x=>x.id===aid);
      if(a){a.display_name=updated.display_name;if(newPass)a.password=newPass;}
      showToast('✓ '+t().saved);render();
    }catch(e){showToast('❌ '+t().errSave,'err')}
  });
  const sac=g('sac');if(sac)sac.addEventListener('click',async()=>{
    const u=gv('m-user'),p=gv('m-pass'),n=gv('m-name'),role=gv('m-role'),sl=gv('m-sl');
    if(!u||!p)return;S.modal=null;render();
    try{const[na]=await api('accounts',{method:'POST',body:JSON.stringify({id:'acc_'+Date.now(),username:u,password:p,display_name:n||u,role,store_id:sl?parseInt(sl):null})});S.accounts.push(na);showToast('✓ '+t().saved);render()}catch(e){showToast('❌ '+t().errSave,'err')}
  });
}

function confirmStockReset(storeId, storeName){
  S.modal={type:'reset-stock', storeId, storeName};
  render();
}

async function resetStoreStock(storeId){
  try{
    // Set all stock for this store to 0
    await api(`stock?store_id=eq.${storeId}`,{method:'PATCH',body:JSON.stringify({quantity:0})});
    // Update local state
    Object.keys(S.stock).forEach(k=>{
      if(k.startsWith(storeId+'-')) S.stock[k]=0;
    });
    showToast('✓ Stock gereset naar 0');
    render();
  }catch(e){showToast('❌ '+t().errSave,'err')}
}

async function updateComplaint(id,updates){
  try{
    await api(`complaints?id=eq.${id}`,{method:'PATCH',body:JSON.stringify(updates)});
    const c=(S.complaints||[]).find(x=>x.id===id);
    if(c)Object.assign(c,updates);
    showToast('✓ Klacht bijgewerkt');render();
  }catch(e){showToast('❌ Fout bij opslaan','err')}
}

async function logOrderHistory(orderId,event){
  try{
    const[h]=await api('order_history',{method:'POST',body:JSON.stringify({order_id:orderId,store_id:S.orders.find(x=>x.id===orderId)?.store_id,event})});
    if(h)(S.orderHistory=S.orderHistory||[]).unshift(h);
  }catch(e){}
}

async function cleanOldRecords(){
  const cutoff=new Date(Date.now()-14*24*60*60*1000).toISOString();
  try{
    await api(`complaints?created_at=lt.${cutoff}`,{method:'DELETE',headers:{}});
    await api(`order_history?created_at=lt.${cutoff}`,{method:'DELETE',headers:{}});
    S.complaints=(S.complaints||[]).filter(c=>new Date(c.created_at)>new Date(cutoff));
    S.orderHistory=(S.orderHistory||[]).filter(h=>new Date(h.created_at)>new Date(cutoff));
  }catch(e){}
}

async function updateOrderStatus(id,status){
  try{
    await api(`orders?id=eq.${id}`,{method:'PATCH',body:JSON.stringify({status})});
    const o=S.orders.find(x=>x.id===id);
    if(o){
      o.status=status;
      if(status==='done'){
        const items=(S.orderItems||[]).filter(i=>i.order_id===id);
        for(const item of items){
          const sid=o.store_id,pid=item.product_id,addQty=item.quantity;
          const key=sid+'-'+pid,newQty=(S.stock[key]??0)+addQty;
          const ex=await api(`stock?store_id=eq.${sid}&product_id=eq.${pid}`);
          if(ex&&ex.length){await api(`stock?store_id=eq.${sid}&product_id=eq.${pid}`,{method:'PATCH',body:JSON.stringify({quantity:newQty})})}
          else{await api('stock',{method:'POST',body:JSON.stringify({store_id:sid,product_id:pid,quantity:newQty})})}
          S.stock[key]=newQty;
          // Log stock history for order completion
          api('stock_history',{method:'POST',body:JSON.stringify({store_id:sid,product_id:pid,account_id:S.session?.id,old_quantity:newQty-addQty,new_quantity:newQty})})
            .then(res=>{if(res&&res[0])(S.stockHistory=S.stockHistory||[]).unshift(res[0])}).catch(()=>{});
        }
        const st=S.stores.find(s=>s.id===o.store_id);
        await logOrderHistory(id,`✅ Geleverd — voorraad bijgewerkt voor ${st?st.name:'winkel'}`);
        showToast('✓ '+t().stockUpdatedFor+' '+(st?st.name:''));
      }else if(status==='sent'){
        await logOrderHistory(id,'📦 Order verzonden');
        showToast('✓ '+t().saved);
      }else{showToast('✓ '+t().saved)}
    }
    render();
  }catch(e){showToast('❌ '+t().errSave,'err')}
}

async function deleteOrder(id){
  try{await api(`orders?id=eq.${id}`,{method:'DELETE',headers:{}});S.orders=S.orders.filter(o=>o.id!==id);S.orderItems=S.orderItems.filter(i=>i.order_id!==id);S.messages=S.messages.filter(m=>m.order_id!==id);render()}
  catch(e){showToast('❌ '+t().errSave,'err')}
}
async function deleteStore(id){
  try{await api(`stores?id=eq.${id}`,{method:'DELETE',headers:{}});S.stores=S.stores.filter(s=>s.id!==id);S.accounts=S.accounts.filter(a=>a.store_id!==id);render()}
  catch(e){showToast('❌ '+t().errSave,'err')}
}
async function deleteProduct(id){
  try{await api(`products?id=eq.${id}`,{method:'DELETE',headers:{}});S.products=S.products.filter(p=>p.id!==id);render()}
  catch(e){showToast('❌ '+t().errSave,'err')}
}
async function deleteAccount(id){
  try{await api(`accounts?id=eq.${id}`,{method:'DELETE',headers:{}});S.accounts=S.accounts.filter(a=>a.id!==id);render()}
  catch(e){showToast('❌ '+t().errSave,'err')}
}

// Auto-refresh polling every 30 seconds for admin
let pollInterval=null;
let lastOrderCount=0;
let lastMsgCount=0;

function startPolling(){
  if(pollInterval)clearInterval(pollInterval);
  pollInterval=setInterval(async()=>{
    if(!S.session||S.session.role!=='admin')return;
    try{
      const[orders,messages]=await Promise.all([
        api('orders?order=id.desc'),
        api('messages?order=created_at'),
      ]);
      const newOrders=orders||[];
      const newMsgs=messages||[];
      const newOrderCount=newOrders.length;
      const newMsgCount=newMsgs.filter(m=>m.from_account!=='admin'&&!m.is_read).length;

      // Check for new orders
      if(lastOrderCount>0&&newOrderCount>lastOrderCount){
        const diff=newOrderCount-lastOrderCount;
        showNotification(`📦 ${diff} nieuwe order${diff>1?'s':''}!`);
      }
      // Check for new unread messages
      const prevUnread=(S.messages||[]).filter(m=>m.from_account!=='admin'&&!m.is_read).length;
      if(prevUnread<newMsgCount){
        const diff=newMsgCount-prevUnread;
        showNotification(`💬 ${diff} nieuw bericht${diff>1?'en':''}!`);
      }

      lastOrderCount=newOrderCount;
      S.orders=newOrders;
      S.messages=newMsgs;
      // Only re-render the badge counts (non-disruptive)
      updateBadges();
    }catch(e){}
  },30000);
}

function stopPolling(){
  if(pollInterval){clearInterval(pollInterval);pollInterval=null;}
}

function updateBadges(){
  // Update tab badges without full re-render
  const or=openReqs();
  const unread=(S.messages||[]).filter(m=>m.from_account!=='admin'&&!m.is_read).length;
  const orderTab=document.querySelector('[data-sub="orders"]');
  if(orderTab){
    const badges=[];
    if(or)badges.push(`<span style="background:#3C3489;color:#fff;border-radius:10px;padding:0 5px;font-size:10px;margin-left:3px">${or}</span>`);
    if(unread)badges.push(`<span style="background:#D4537E;color:#fff;border-radius:10px;padding:0 5px;font-size:10px;margin-left:3px">💬${unread}</span>`);
    orderTab.innerHTML=TR[S.lang].orders+badges.join('');
  }
}

function showNotification(msg){
  // Play a soft beep
  try{
    const ctx=new(window.AudioContext||window.webkitAudioContext)();
    const osc=ctx.createOscillator();
    const gain=ctx.createGain();
    osc.connect(gain);gain.connect(ctx.destination);
    osc.frequency.value=880;gain.gain.value=0.1;
    osc.start();gain.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.3);
    osc.stop(ctx.currentTime+0.3);
  }catch(e){}
  // Show toast notification
  const el=document.createElement('div');
  el.style.cssText='position:fixed;top:1.5rem;right:1.5rem;background:#D4537E;color:#fff;border-radius:var(--r1);padding:12px 18px;font-size:13px;font-weight:500;z-index:9999;box-shadow:0 4px 16px rgba(0,0,0,0.2);cursor:pointer;font-family:var(--sans)';
  el.textContent=msg;
  el.addEventListener('click',()=>{el.remove();S.adminSubTab='orders';render()});
  document.body.appendChild(el);
  setTimeout(()=>el.remove(),6000);
  // Push notification
  sendPushNotification('Rejoes Stock', msg, '/Rijn-Stockmanagement/');
}

function requestNotificationPermission(){
  if('Notification' in window&&Notification.permission==='default'){
    Notification.requestPermission();
  }
}

// Capture PWA install prompt
window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  window._pwaInstallPrompt = e;
  // Show install button if exists
  const btn = document.getElementById('install-pwa-btn');
  if(btn) btn.style.display = 'inline-flex';
});

window.addEventListener('appinstalled', () => {
  window._pwaInstallPrompt = null;
  showToast('✓ App geïnstalleerd!');
});

// Register Service Worker for PWA
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('sw.js')
    .then(reg=>{
      console.log('SW registered');
      S.swReg=reg;
    })
    .catch(err=>console.log('SW error:', err));
}

// Request push notification permission
async function requestPushPermission(){
  if(!('Notification' in window))return;
  if(Notification.permission==='default'){
    const perm=await Notification.requestPermission();
    if(perm==='granted')showToast('✓ Notificaties ingeschakeld!');
  }
}

// Send local push notification (works when app is open)
function sendPushNotification(title, body, url){
  if(Notification.permission==='granted'){
    if(S.swReg){
      S.swReg.showNotification(title,{
        body,
        icon:'icon-192.png',
        badge:'icon-192.png',
        vibrate:[200,100,200],
        data:{url},
        tag:'rejoes-stock'
      });
    }else{
      new Notification(title,{body,icon:'icon-192.png'});
    }
  }
}

// Check if we have a saved session with company
const _savedSession=getSavedSession();
const _savedCompany=localStorage.getItem('appCompany');
if(_savedSession&&_savedCompany){
  try{
    S.company=JSON.parse(_savedCompany);
    S.session=_savedSession;
    S.screen='login';
    loadAll().then(()=>{cleanOldRecords();checkWeeklyReset();});
  }catch(e){S.screen='portal';S.loading=false;render();}
}else{
  S.loading=false;
  S.screen='portal';
  render();
}
// Start polling after initial load
setTimeout(()=>{
  if(S.session?.role==='admin'){
    lastOrderCount=S.orders.length;
    lastMsgCount=(S.messages||[]).filter(m=>m.from_account!=='admin'&&!m.is_read).length;
    startPolling();
    requestNotificationPermission();
        requestPushPermission();
  }
},3000);
</script>
