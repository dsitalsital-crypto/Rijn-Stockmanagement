// Session persistence - restore session if within 1 hour
function getSavedSession(){
  try{
    const raw=localStorage.getItem('appSession');
    if(!raw)return null;
    const{session,savedAt}=JSON.parse(raw);
    if(Date.now()-savedAt<60*60*1000)return session; // 1 hour
    localStorage.removeItem('appSession');
  }catch(e){}
  return null;
}
function saveSession(session){
  try{localStorage.setItem('appSession',JSON.stringify({session,savedAt:Date.now()}))}catch(e){}
}
function clearSession(){
  try{localStorage.removeItem('appSession')}catch(e){}
}

  session:getSavedSession(),modal:null,search:'',productSearch:'',filterStore:'all',filterStatus:'all',

  stores:[],products:[],stock:{},orders:[],orderItems:[],accounts:[],messages:[],
  loading:true,
};

const barCol=(q,min)=>min===0?GREEN:q===0?RED:q<min?AMBER:GREEN;

async function api(path,opts={}){
  const sep=path.includes('?')?'&':'?';
  const url=SB+'/rest/v1/'+path+sep+'apikey='+KEY;
  const isDelete=opts.method==='DELETE';
  const headers={'apikey':KEY,'Authorization':'Bearer '+KEY,'Content-Type':'application/json'};
  if(!isDelete)headers['Prefer']='return=representation';
  const res=await fetch(url,{...opts,headers});
  if(!res.ok){const e=await res.text();throw new Error(e)}
  const txt=await res.text();
  return txt?JSON.parse(txt):null;
}

async function loadAll(){
  S.loading=true;render();
  try{
    const[stores,products,stockRows,orders,orderItems,accounts,messages]=await Promise.all([
      api('stores?order=id'),api('products?order=name'),api('stock?select=*'),
      api('orders?order=id.desc'),api('order_items?select=*'),
      api('accounts?order=username'),api('messages?order=created_at'),
    ]);
    S.stores=stores||[];S.products=products||[];
    S.stock={};(stockRows||[]).forEach(r=>{S.stock[r.store_id+'-'+r.product_id]=r.quantity});
    S.orders=orders||[];S.orderItems=orderItems||[];
    S.accounts=accounts||[];S.messages=messages||[];
  }catch(e){showToast('❌ '+e.message,'err')}
  S.loading=false;render();
}

const qty=(sid,pid)=>S.stock[sid+'-'+pid]??0;
const storeTotal=sid=>S.products.reduce((a,p)=>a+qty(sid,p.id),0);
const storeItems=sid=>S.products.filter(p=>qty(sid,p.id)>0).length;
const totalAll=()=>{let x=0;S.products.forEach(p=>S.stores.forEach(s=>{x+=qty(s.id,p.id)}));return x};
const allLow=()=>{let c=0;S.products.forEach(p=>S.stores.forEach(s=>{const q=qty(s.id,p.id);if(p.min_stock>0&&q>0&&q<p.min_stock)c++}));return c};
const allOut=()=>{let c=0;S.products.forEach(p=>S.stores.forEach(s=>{if(p.min_stock>0&&qty(s.id,p.id)===0)c++}));return c};
const openReqs=()=>(S.orders||[]).filter(o=>o.status==='new'||o.status==='sent').length;

function sbadge(q,min){const l=t();if(min===0)return`<span class="badge bok">${l.ok}</span>`;return q===0?`<span class="badge bout">${l.outLbl}</span>`:q<min?`<span class="badge blow">${l.lowLbl}</span>`:`<span class="badge bok">${l.ok}</span>`}
function rbadge(s){const l=t();return s==='new'?`<span class="badge bnew">${l.new}</span>`:s==='sent'?`<span class="badge bsent">${l.sent}</span>`:`<span class="badge bdone">${l.done}</span>`}

function showToast(msg,type='ok'){
  const el=document.createElement('div');el.className='toast '+(type||'');el.textContent=msg;
  document.body.appendChild(el);setTimeout(()=>el.remove(),2500);
}
function langBar(){return`<div style="display:flex;gap:5px">
  <button class="lbtn ${S.lang==='nl'?'on':''}" data-lang="nl">NL</button>
  <button class="lbtn ${S.lang==='en'?'on':''}" data-lang="en">EN</button>
  <button class="lbtn ${S.lang==='tr'?'on':''}" data-lang="tr">TR</button>
</div>`}

function render(){
  if(S.session)saveSession(S.session); // refresh 1hr timer on activity
  g('root').innerHTML=S.loading?`<div class="loading"><div class="spinner"></div>${t().loading}</div>`:S.session?buildApp():buildLogin();
  bind();if(!S.loading&&S.modal)bindModal();
  if(S.modal&&S.modal.type==='chat'){setTimeout(()=>{const el=g('chat-msgs');if(el)el.scrollTop=el.scrollHeight},50)}
}
function renderKeepFocus(focusId){
  const val=focusId?gv(focusId):'';render();
  if(focusId){const e=g(focusId);if(e){e.focus();e.value=val;e.setSelectionRange(val.length,val.length)}}
}

function bStock(){
  const l=t();
  const cols=S.filterStore==='all'?S.stores:S.stores.filter(s=>s.id===parseInt(S.filterStore));
  const maxQ=Math.max(1,...S.products.flatMap(p=>S.stores.map(s=>qty(s.id,p.id))));
  const filtered=S.products.filter(p=>{
    if(S.search&&!p.name.toLowerCase().includes(S.search.toLowerCase())&&!p.sku.toLowerCase().includes(S.search.toLowerCase()))return false;
    if(S.filterStore!=='all'){const sid=parseInt(S.filterStore),q=qty(sid,p.id);if(S.filterStatus==='low'&&!(q>0&&q<p.min_stock))return false;if(S.filterStatus==='out'&&q!==0)return false}
    return true;
  });
  const show=cols.slice(0,5),extra=cols.length-show.length;
  return`<div class="panel">
  <div class="ph"><span class="pht">${l.stockOv}</span>
    <div style="display:flex;gap:7px;flex-wrap:wrap;align-items:center">
      <input type="text" id="srch" placeholder="${l.search}" value="${S.search}" style="width:130px;height:30px;font-size:12px">
      <select id="fstore" style="height:30px;font-size:12px"><option value="all">${l.allStores}</option>${S.stores.map(s=>`<option value="${s.id}" ${S.filterStore==s.id?'selected':''}>${s.name}</option>`).join('')}</select>
      <select id="fstatus" style="height:30px;font-size:12px"><option value="all">${l.allSt}</option><option value="low">${l.low}</option><option value="out">${l.outSt}</option></select>
    </div>
  </div>
  <div class="tw"><table>
    <colgroup><col style="width:160px"><col style="width:70px">${show.map(()=>'<col style="width:115px">').join('')}${extra?'<col style="width:70px">':''}<col style="width:58px"><col style="width:60px"></colgroup>
    <thead><tr><th>${l.product}</th><th>${l.sku}</th>${show.map(s=>`<th title="${s.name}">${s.name}</th>`).join('')}${extra?`<th>+${extra}</th>`:''}<th>${l.totalLbl}</th><th>${l.status}</th></tr></thead>
    <tbody>${filtered.length?filtered.map(p=>{
      const tot=S.stores.reduce((a,s)=>a+qty(s.id,p.id),0);
      return`<tr>
        <td><div style="font-weight:500">${p.name}</div><div style="font-size:10px;color:var(--t3)">${p.category}·${p.size}</div></td>
        <td style="color:var(--t2)">${p.sku}</td>
        ${show.map(s=>{const q=qty(s.id,p.id),pct=Math.round(q/maxQ*100),c=barCol(q,p.min_stock);
          return`<td><div class="barcell"><span style="min-width:26px;text-align:right;font-weight:500;color:${p.min_stock>0&&q===0?RED:p.min_stock>0&&q<p.min_stock?AMBER:'var(--t1)'}">${q}</span><div class="barbg"><div class="barfill" style="width:${pct}%;background:${c}"></div></div></div>
          <span class="elk" data-edit="${s.id}-${p.id}" style="font-size:10px;color:var(--t3);cursor:pointer">${l.edit.toLowerCase()}</span>
          <span class="rlk" data-req="${s.id}-${p.id}" style="font-size:10px;color:#7F77DD;cursor:pointer;margin-left:4px">${l.req}</span></td>`;
        }).join('')}
        ${extra?`<td style="color:var(--t3);font-size:11px">${l.useFilter}</td>`:''}
        <td style="font-weight:500">${tot}</td><td>${sbadge(tot,p.min_stock)}</td>
      </tr>`;
    }).join(''):`<tr><td colspan="20" style="text-align:center;padding:2rem;color:var(--t3)">${l.noProducts}</td></tr>`}
    </tbody>
  </table></div>
</div>`}

function bAlerts(){
  const l=t(),items=[];
  S.products.forEach(p=>S.stores.forEach(s=>{const q=qty(s.id,p.id);if(p.min_stock>0&&q===0)items.push({type:'out',s,p,q});else if(p.min_stock>0&&q<p.min_stock)items.push({type:'low',s,p,q})}));
  items.sort((a,b)=>a.type==='out'&&b.type!=='out'?-1:1);
  return`<div class="panel">
  <div class="ph"><span class="pht">${l.stockAlerts}</span><span style="font-size:11px;color:var(--t2)">${items.length} ${l.active}</span></div>

          <td><button class="btn bsm chat-order" data-id="${o.id}">💬${unread?` <span style="background:#D4537E;color:#fff;border-radius:10px;padding:0 4px;font-size:10px">${unread}</span>`:''}</button></td>
        </tr>`;
      }).join(''):`<tr><td colspan="5" style="text-align:center;padding:1.5rem;color:var(--t3)">${l.noMyOrders}</td></tr>`}
      </tbody>
    </table></div>
  </div>
  ${S.modal?buildModal():''}
</div>`}

function buildModal(){
  const l=t(),m=S.modal;let inner='';

  if(m.type==='edit-stock'){inner=`<h3>${l.updateStock}</h3>
    <p style="font-size:12px;color:var(--t2);margin-bottom:.9rem">${m.pName} — ${m.sName}</p>
    <div class="fr"><label>${l.qty}</label><input type="number" id="m-qty" value="${m.cur}" min="0"></div>
    <div class="fa"><button class="btn" id="mc">${l.cancel}</button><button class="btn bp" id="ss">${l.save}</button></div>`;}

  else if(m.type==='add-order'||m.type==='edit-order'){
    const isStore=S.session.role==='store';
    const isEdit=m.type==='edit-order';
    const o=m.order||null;
    const rows=m.rows||[{productId:S.products[0]?.id,qty:1}];
    const sf=isStore?`<input type="hidden" id="m-store" value="${S.session.store_id}">`
      :`<div class="fr"><label>${l.store}</label><select id="m-store">${S.stores.map(s=>`<option value="${s.id}" ${(isEdit?o.store_id:m.storeId)==s.id?'selected':''}>${s.name}</option>`).join('')}</select></div>`;
    inner=`<h3>${isEdit?l.editOrder:l.addOrder}</h3>
    ${sf}
    <div id="req-rows">${rows.map((r,i)=>`
      <div class="req-row" style="display:flex;gap:6px;align-items:flex-end;margin-bottom:8px">
        <div style="flex:1"><label style="display:block;font-size:11px;color:var(--t2);margin-bottom:3px">${l.product}</label>
          <select class="rp-product">${S.products.map(p=>`<option value="${p.id}" ${r.productId==p.id?'selected':''}>${p.name}</option>`).join('')}</select>
        </div>
        <div style="width:80px"><label style="display:block;font-size:11px;color:var(--t2);margin-bottom:3px">${l.qty}</label>
          <input type="number" class="rp-qty" value="${r.qty||1}" min="0" style="width:80px">
        </div>
        ${rows.length>1?`<button class="btn bd bsm rm-row" data-i="${i}" style="margin-bottom:1px">✕</button>`:''}
      </div>`).join('')}</div>
    <button class="btn bsm" id="add-row-btn" style="margin-bottom:10px">+ ${l.product}</button>
    <div class="fr"><label>${l.note}</label><textarea id="m-note">${isEdit?o.note||'':''}</textarea></div>
    <div class="fa"><button class="btn" id="mc">${l.cancel}</button><button class="btn bp" id="sorder">${isEdit?l.save:l.submit}</button></div>`;}

  else if(m.type==='chat'){
    const o=S.orders.find(x=>x.id===m.orderId);
    const st=S.stores.find(x=>x.id===o?.store_id);
    const msgs=(S.messages||[]).filter(x=>x.order_id===m.orderId).sort((a,b)=>new Date(a.created_at)-new Date(b.created_at));
    const isAdmin=S.session.role==='admin';
    inner=`<h3>💬 ${l.chatTitle} — ${st?st.name:'—'} <span style="font-size:11px;font-weight:400;color:var(--t2)">#${m.orderId}</span></h3>
    <div id="chat-msgs" style="height:280px;overflow-y:auto;border:0.5px solid var(--b3);border-radius:var(--r1);padding:10px;display:flex;flex-direction:column;gap:6px;margin-bottom:10px;background:var(--bg2)">
      ${msgs.length?msgs.map(msg=>{
        const fromMe=isAdmin?(msg.from_account==='admin'):(msg.from_account!=='admin');
        const ts=msg.created_at?new Date(msg.created_at).toLocaleTimeString('nl-NL',{hour:'2-digit',minute:'2-digit'}):'';
        const senderName=msg.from_account==='admin'?l.admin:(st?.name||'Winkel');
        return`<div class="chat-bubble" style="align-items:${fromMe?'flex-end':'flex-start'}">
          <div class="chat-msg" style="background:${fromMe?'#D4537E':'var(--bg1)'};color:${fromMe?'#fff':'var(--t1)'};">${msg.message}</div>
          <div style="font-size:10px;color:var(--t3);margin-top:2px">${senderName} · ${ts}</div>
        </div>`;
      }).join(''):`<div style="text-align:center;color:var(--t3);font-size:12px;padding:2rem">${l.noMsgs}</div>`}
    </div>
    <div style="display:flex;gap:7px">
      <input type="text" id="chat-inp" placeholder="${l.msgPh}" style="flex:1;height:34px;font-size:13px">
      <button class="btn bp" id="send-msg">${l.sendMsg}</button>
    </div>
    <div class="fa"><button class="btn" id="mc">${l.cancel}</button></div>`;}

  else if(m.type==='edit-product'){inner=`<h3>${l.edit} product</h3>
    <div class="fr"><label>${l.name}</label><input type="text" id="m-name" value="${m.p.name}"></div>
    <div class="fr"><label>${l.sku}</label><input type="text" id="m-sku" value="${m.p.sku}"></div>
    <div class="fr"><label>${l.cat}</label><input type="text" id="m-cat" value="${m.p.category}"></div>
    <div class="fr"><label>${l.size}</label><input type="text" id="m-size" value="${m.p.size}"></div>
    <div class="fr"><label>${l.minStock}</label><input type="number" id="m-min" value="${m.p.min_stock}" min="0"></div>
    <div class="fa"><button class="btn" id="mc">${l.cancel}</button><button class="btn bp" id="uprod">${l.save}</button></div>`;}

  else if(m.type==='add-store'){inner=`<h3>${l.addStore}</h3>
    <div class="fr"><label>${l.name}</label><input type="text" id="m-name"></div>
    <div class="fr"><label>${l.city}</label><input type="text" id="m-city"></div>
    <div class="fa"><button class="btn" id="mc">${l.cancel}</button><button class="btn bp" id="ssto">${l.add}</button></div>`;}

  else if(m.type==='add-product'){inner=`<h3>${l.addProduct}</h3>
    <div class="fr"><label>${l.name}</label><input type="text" id="m-name"></div>
    <div class="fr"><label>${l.sku}</label><input type="text" id="m-sku" placeholder="APP-007"></div>
    <div class="fr"><label>${l.cat}</label><input type="text" id="m-cat"></div>
    <div class="fr"><label>${l.size}</label><input type="text" id="m-size"></div>
    <div class="fr"><label>${l.minStock}</label><input type="number" id="m-min" value="0" min="0"></div>
    <div class="fa"><button class="btn" id="mc">${l.cancel}</button><button class="btn bp" id="sp">${l.add}</button></div>`;}

  else if(m.type==='add-account'){inner=`<h3>${l.addAccount}</h3>
    <div class="fr"><label>${l.user}</label><input type="text" id="m-user"></div>
    <div class="fr"><label>${l.pass}</label><input type="text" id="m-pass"></div>
    <div class="fr"><label>${l.dispName}</label><input type="text" id="m-name"></div>
    <div class="fr"><label>${l.role}</label><select id="m-role"><option value="store">${l.storeRole}</option><option value="admin">${l.admin}</option></select></div>
    <div class="fr"><label>${l.linkedStore}</label><select id="m-sl"><option value="">${l.none}</option>${S.stores.map(s=>`<option value="${s.id}">${s.name}</option>`).join('')}</select></div>
    <div class="fa"><button class="btn" id="mc">${l.cancel}</button><button class="btn bp" id="sac">${l.add}</button></div>`;}

  return`<div class="mover" id="mo"><div class="mbox">${inner}</div></div>`;
}

function doLogin(){
  const l=t(),u=gv('lu'),p=gv('lp');
  const acc=S.accounts.find(x=>x.username===u&&x.password===p);
  if(acc){S.session=acc;saveSession(acc);S.loginErr='';render();}
  else{S.loginErr=l.loginErr;S.loginUser=u;S.loginPass=p;render();}
}

function bind(){
  document.querySelectorAll('[data-lang]').forEach(el=>el.addEventListener('click',()=>{S.lang=el.dataset.lang;localStorage.setItem('appLang',S.lang);render()}));
  const lb=g('login-btn');if(lb){lb.addEventListener('click',doLogin);['lu','lp'].forEach(id=>{const e=g(id);if(e)e.addEventListener('keydown',ev=>{if(ev.key==='Enter')doLogin()})})}
  document.querySelectorAll('[data-quick]').forEach(el=>el.addEventListener('click',()=>{const a=S.accounts.find(x=>x.username===el.dataset.quick);if(a&&g('lu')&&g('lp')){g('lu').value=a.username;g('lp').value=a.password}}));
  const lo=g('logout-btn');if(lo)lo.addEventListener('click',()=>{S.session=null;S.modal=null;clearSession();render()});
  const rb=g('refresh-btn');if(rb)rb.addEventListener('click',()=>loadAll());
  document.querySelectorAll('[data-sub]').forEach(el=>el.addEventListener('click',()=>{S.adminSubTab=el.dataset.sub;render()}));
  const sr=g('srch');if(sr)sr.addEventListener('input',e=>{S.search=e.target.value;renderKeepFocus('srch')});
  const psr=g('psrch');if(psr)psr.addEventListener('input',e=>{S.productSearch=e.target.value;renderKeepFocus('psrch')});
  const fs=g('fstore');if(fs)fs.addEventListener('change',e=>{S.filterStore=e.target.value;render()});
  const fst=g('fstatus');if(fst)fst.addEventListener('change',e=>{S.filterStatus=e.target.value;render()});
  document.querySelectorAll('.elk').forEach(el=>el.addEventListener('click',()=>{
    const[sid,pid]=el.dataset.edit.split('-').map(Number);
    const p=S.products.find(x=>x.id===pid),st=S.stores.find(x=>x.id===sid);
    S.modal={type:'edit-stock',storeId:sid,productId:pid,sName:st?.name,pName:p?.name,cur:qty(sid,pid)};render();
  }));
  document.querySelectorAll('.rlk').forEach(el=>el.addEventListener('click',()=>{
    const[sid,pid]=el.dataset.req.split('-').map(Number);
    S.modal={type:'add-order',storeId:sid,rows:[{productId:pid,qty:1}]};render();
  }));
  document.querySelectorAll('.eorder').forEach(el=>el.addEventListener('click',()=>{
    const o=S.orders.find(x=>x.id===parseInt(el.dataset.id));
    if(o){const items=(S.orderItems||[]).filter(i=>i.order_id===o.id);S.modal={type:'edit-order',order:o,rows:items.length?items.map(i=>({productId:i.product_id,qty:i.quantity})):[{productId:S.products[0]?.id,qty:1}]};render();}
  }));
  document.querySelectorAll('.chat-order').forEach(el=>el.addEventListener('click',async()=>{
    const oid=parseInt(el.dataset.id);
    const unread=(S.messages||[]).filter(m=>m.order_id===oid&&m.from_account!==S.session.id&&!m.is_read);
    for(const m of unread){try{await api(`messages?id=eq.${m.id}`,{method:'PATCH',body:JSON.stringify({is_read:true})});m.is_read=true;}catch(e){}}
    S.modal={type:'chat',orderId:oid};render();
  }));
  document.querySelectorAll('.msent').forEach(el=>el.addEventListener('click',()=>updateOrderStatus(parseInt(el.dataset.id),'sent')));
  document.querySelectorAll('.mdone').forEach(el=>el.addEventListener('click',()=>updateOrderStatus(parseInt(el.dataset.id),'done')));
  document.querySelectorAll('.dorder').forEach(el=>el.addEventListener('click',()=>deleteOrder(parseInt(el.dataset.id))));
  document.querySelectorAll('.dstore').forEach(el=>el.addEventListener('click',()=>deleteStore(parseInt(el.dataset.id))));
  document.querySelectorAll('.dprod').forEach(el=>el.addEventListener('click',()=>deleteProduct(parseInt(el.dataset.id))));
  document.querySelectorAll('.dacc').forEach(el=>el.addEventListener('click',()=>deleteAccount(el.dataset.id)));
  document.querySelectorAll('.eprod').forEach(el=>el.addEventListener('click',()=>{const p=S.products.find(x=>x.id===parseInt(el.dataset.id));if(p){S.modal={type:'edit-product',p};render();}}));
  const aob=g('add-order-btn');if(aob)aob.addEventListener('click',()=>{S.modal={type:'add-order',storeId:S.stores[0]?.id,rows:[{productId:S.products[0]?.id,qty:1}]};render()});
  const sob=g('store-order-btn');if(sob)sob.addEventListener('click',()=>{S.modal={type:'add-order',storeId:S.session.store_id,rows:[{productId:S.products[0]?.id,qty:1}]};render()});
  const asb=g('add-store-btn');if(asb)asb.addEventListener('click',()=>{S.modal={type:'add-store'};render()});
  const bsb=g('back-stores-btn');if(bsb)bsb.addEventListener('click',()=>{S.selectedStore=null;render()});
  document.querySelectorAll('.store-row').forEach(el=>el.addEventListener('click',e=>{
    if(e.target.classList.contains('dstore')||e.target.classList.contains('btn'))return;
    S.selectedStore=parseInt(el.dataset.sid);render();
  }));
  const apb=g('add-prod-btn');if(apb)apb.addEventListener('click',()=>{S.modal={type:'add-product'};render()});
  const aab=g('add-acc-btn');if(aab)aab.addEventListener('click',()=>{S.modal={type:'add-account'};render()});
}

function bindModal(){
  const mo=g('mo');if(mo)mo.addEventListener('click',e=>{if(e.target===mo){S.modal=null;render()}});
  const mc=g('mc');if(mc)mc.addEventListener('click',()=>{S.modal=null;render()});

  const ss=g('ss');if(ss)ss.addEventListener('click',async()=>{
    const sid=S.modal.storeId,pid=S.modal.productId,nq=parseInt(gv('m-qty'));
    const newQty=isNaN(nq)?0:nq;S.modal=null;render();
    try{
      const ex=await api(`stock?store_id=eq.${sid}&product_id=eq.${pid}`);
      if(ex&&ex.length){await api(`stock?store_id=eq.${sid}&product_id=eq.${pid}`,{method:'PATCH',body:JSON.stringify({quantity:newQty})})}
      else{await api('stock',{method:'POST',body:JSON.stringify({store_id:sid,product_id:pid,quantity:newQty})})}
      S.stock[sid+'-'+pid]=newQty;showToast('✓ '+t().saved);render();
    }catch(e){showToast('❌ '+t().errSave,'err')}
  });

  const sorder=g('sorder');if(sorder)sorder.addEventListener('click',async()=>{
    const isEdit=S.modal.type==='edit-order';
    const sid=parseInt(g('m-store').value);
    const note=gv('m-note');
    const rows=[...document.querySelectorAll('.req-row')].map((_,i)=>({
      product_id:parseInt(document.querySelectorAll('.rp-product')[i]?.value),
      quantity:parseInt(document.querySelectorAll('.rp-qty')[i]?.value)||1
    })).filter(r=>r.product_id);
    if(!rows.length)return;
    const oid=isEdit?S.modal.order.id:null;
    S.modal=null;render();
    try{
      if(isEdit){
        await api(`orders?id=eq.${oid}`,{method:'PATCH',body:JSON.stringify({store_id:sid,note})});
        await api(`order_items?order_id=eq.${oid}`,{method:'DELETE',headers:{}});
        const newItems=[];
        for(const r of rows){const[item]=await api('order_items',{method:'POST',body:JSON.stringify({order_id:oid,...r})});newItems.push(item)}
        const o=S.orders.find(x=>x.id===oid);if(o){o.store_id=sid;o.note=note;}
        S.orderItems=(S.orderItems||[]).filter(i=>i.order_id!==oid);S.orderItems.push(...newItems);
      }else{
        const[newOrder]=await api('orders',{method:'POST',body:JSON.stringify({store_id:sid,note,status:'new',created_at:today()})});
        const newItems=[];
        for(const r of rows){const[item]=await api('order_items',{method:'POST',body:JSON.stringify({order_id:newOrder.id,...r})});newItems.push(item)}
        S.orders.unshift(newOrder);S.orderItems.push(...newItems);
        if(S.session.role==='admin')S.adminSubTab='orders';
      }
      showToast('✓ '+t().saved);render();
    }catch(e){showToast('❌ '+t().errSave,'err')}
  });

  const arb=g('add-row-btn');if(arb)arb.addEventListener('click',()=>{S.modal.rows=[...(S.modal.rows||[]),{productId:S.products[0]?.id,qty:1}];render();bindModal()});
  document.querySelectorAll('.rm-row').forEach(el=>el.addEventListener('click',()=>{const i=parseInt(el.dataset.i);S.modal.rows=S.modal.rows.filter((_,idx)=>idx!==i);render();bindModal()}));

  const sm=g('send-msg');
  if(sm){
    const sendMsg=async()=>{
      const inp=g('chat-inp');if(!inp||!inp.value.trim())return;
      const msg=inp.value.trim();inp.value='';
      try{
        const[nm]=await api('messages',{method:'POST',body:JSON.stringify({from_account:S.session.id,order_id:S.modal.orderId,message:msg,is_read:false})});
        (S.messages=S.messages||[]).push(nm);
        const chatEl=g('chat-msgs');
        if(chatEl){
          const isAdmin=S.session.role==='admin';
          const st=S.stores.find(x=>x.id===S.orders.find(o=>o.id===S.modal.orderId)?.store_id);
          const senderName=isAdmin?t().admin:(st?.name||'Winkel');
          const ts=new Date().toLocaleTimeString('nl-NL',{hour:'2-digit',minute:'2-digit'});
          const div=document.createElement('div');
          div.className='chat-bubble';div.style.alignItems='flex-end';
          div.innerHTML=`<div class="chat-msg" style="background:#D4537E;color:#fff">${msg}</div><div style="font-size:10px;color:var(--t3);margin-top:2px">${senderName} · ${ts}</div>`;
          chatEl.appendChild(div);chatEl.scrollTop=chatEl.scrollHeight;
        }
      }catch(e){showToast('❌ '+t().errSave,'err')}
    };
    sm.addEventListener('click',sendMsg);
    const ci=g('chat-inp');if(ci)ci.addEventListener('keydown',e=>{if(e.key==='Enter')sendMsg()});
  }

  const uprod=g('uprod');if(uprod)uprod.addEventListener('click',async()=>{
    const pid=S.modal.p.id;
    const minRaw=gv('m-min');const minVal=minRaw===''?0:parseInt(minRaw);
    const updated={name:gv('m-name'),sku:gv('m-sku'),category:gv('m-cat'),size:gv('m-size'),min_stock:isNaN(minVal)?0:minVal};
    S.modal=null;render();
    try{await api(`products?id=eq.${pid}`,{method:'PATCH',body:JSON.stringify(updated)});const p=S.products.find(x=>x.id===pid);if(p)Object.assign(p,updated);showToast('✓ '+t().saved);render()}catch(e){showToast('❌ '+t().errSave,'err')}
  });

  const ssto=g('ssto');if(ssto)ssto.addEventListener('click',async()=>{
    const n=gv('m-name'),c=gv('m-city');if(!n)return;S.modal=null;render();
    try{
      const[ns]=await api('stores',{method:'POST',body:JSON.stringify({name:n,city:c||n})});S.stores.push(ns);
      const uid='store'+ns.id;
      const[na]=await api('accounts',{method:'POST',body:JSON.stringify({id:uid,username:uid,password:uid+'pass',role:'store',store_id:ns.id,display_name:n})});
      S.accounts.push(na);showToast('✓ '+t().saved);render();
    }catch(e){showToast('❌ '+t().errSave,'err')}
  });

  const sp=g('sp');if(sp)sp.addEventListener('click',async()=>{
    const n=gv('m-name');if(!n)return;S.modal=null;render();
    const minRaw=gv('m-min');const minVal=minRaw===''?0:parseInt(minRaw);
    try{const[np]=await api('products',{method:'POST',body:JSON.stringify({name:n,sku:gv('m-sku')||'APP-???',category:gv('m-cat')||t().general,size:gv('m-size')||'—',min_stock:isNaN(minVal)?0:minVal})});S.products.push(np);showToast('✓ '+t().saved);render()}catch(e){showToast('❌ '+t().errSave,'err')}
  });

  const sac=g('sac');if(sac)sac.addEventListener('click',async()=>{
    const u=gv('m-user'),p=gv('m-pass'),n=gv('m-name'),role=gv('m-role'),sl=gv('m-sl');
    if(!u||!p)return;S.modal=null;render();
    try{const[na]=await api('accounts',{method:'POST',body:JSON.stringify({id:'acc_'+Date.now(),username:u,password:p,display_name:n||u,role,store_id:sl?parseInt(sl):null})});S.accounts.push(na);showToast('✓ '+t().saved);render()}catch(e){showToast('❌ '+t().errSave,'err')}
  });
}

async function updateOrderStatus(id,status){
  try{
    await api(`orders?id=eq.${id}`,{method:'PATCH',body:JSON.stringify({status})});
    const o=S.orders.find(x=>x.id===id);
    if(o){
      o.status=status;
      if(status==='done'){
        const items=(S.orderItems||[]).filter(i=>i.order_id===id);
        for(const item of items){
          const sid=o.store_id,pid=item.product_id,addQty=item.quantity;
          const key=sid+'-'+pid,newQty=(S.stock[key]??0)+addQty;
          const ex=await api(`stock?store_id=eq.${sid}&product_id=eq.${pid}`);
          if(ex&&ex.length){await api(`stock?store_id=eq.${sid}&product_id=eq.${pid}`,{method:'PATCH',body:JSON.stringify({quantity:newQty})})}
          else{await api('stock',{method:'POST',body:JSON.stringify({store_id:sid,product_id:pid,quantity:newQty})})}
          S.stock[key]=newQty;
        }
        const st=S.stores.find(s=>s.id===o.store_id);
        showToast('✓ Voorraad bijgewerkt — '+(st?st.name:''));
      }else{showToast('✓ '+t().saved)}
    }
    render();
  }catch(e){showToast('❌ '+t().errSave,'err')}
}

async function deleteOrder(id){
  try{await api(`orders?id=eq.${id}`,{method:'DELETE',headers:{}});S.orders=S.orders.filter(o=>o.id!==id);S.orderItems=S.orderItems.filter(i=>i.order_id!==id);S.messages=S.messages.filter(m=>m.order_id!==id);render()}
  catch(e){showToast('❌ '+t().errSave,'err')}
}
async function deleteStore(id){
  try{await api(`stores?id=eq.${id}`,{method:'DELETE',headers:{}});S.stores=S.stores.filter(s=>s.id!==id);S.accounts=S.accounts.filter(a=>a.store_id!==id);render()}
  catch(e){showToast('❌ '+t().errSave,'err')}
}
async function deleteProduct(id){
  try{await api(`products?id=eq.${id}`,{method:'DELETE',headers:{}});S.products=S.products.filter(p=>p.id!==id);render()}
  catch(e){showToast('❌ '+t().errSave,'err')}
}
async function deleteAccount(id){
  try{await api(`accounts?id=eq.${id}`,{method:'DELETE',headers:{}});S.accounts=S.accounts.filter(a=>a.id!==id);render()}
  catch(e){showToast('❌ '+t().errSave,'err')}
}

loadAll();
</script>
